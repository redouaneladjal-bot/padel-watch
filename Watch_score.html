<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360, height=360, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PadelTap Watch</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 360px;
      height: 360px;
      overflow: hidden;
      background: #0f2340;
      font-family: Arial, sans-serif;
    }

    .watch {
      position: relative;
      width: 360px;
      height: 360px;
      border-radius: 180px;
      background: #0f2340;
      overflow: hidden;
    }

    .mode-toggle {
      position: absolute;
      top: 12px;
      left: 143px;
      width: 74px;
      height: 30px;
      border-radius: 16px;
      background: #1d3a5c;
      border: 2px solid #4f84a8;
      color: #ffffff;
      font-size: 13px;
      font-weight: bold;
      line-height: 30px;
      text-align: center;
      cursor: pointer;
    }

    .sets-board {
      position: absolute;
      left: 12px;
      top: 126px;
      width: 98px;
      color: #ffffff;
      font-weight: bold;
      font-size: 11px;
    }

    .sets-row {
      display: flex;
      height: 24px;
    }

    .sets-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      border-right: 1px solid rgba(255,255,255,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.35);
    }

    .sets-row:last-child .sets-cell {
      border-bottom: none;
    }

    .sets-cell:last-child {
      border-right: none;
    }

    .c0 { width: 16px; }
    .c1, .c2, .c3 { width: 27px; }

    .score-a, .score-b {
      position: absolute;
      left: 128px;
      width: 104px;
      height: 104px;
      border-radius: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      user-select: none;
    }

    .score-a {
      top: 72px;
      background: #f2c300;
      color: #123047;
    }

    .score-b {
      top: 190px;
      background: #aeb4bd;
      color: #123047;
    }

    .disabled {
      opacity: 0.6;
    }

    .controls {
      position: absolute;
      top: 110px;
      right: 18px;
      width: 52px;
    }

    .small-btn {
      width: 46px;
      height: 46px;
      margin-bottom: 12px;
      border-radius: 23px;
      background: #66b8e8;
      border: 2px solid #2c7aa8;
      color: white;
      font-size: 18px;
      font-weight: bold;
      line-height: 42px;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .small-btn.locked {
      background: #9b2b2b;
      border-color: #6f1717;
    }

    .small-btn.holding {
      background: #9b2b2b;
    }

    .set-indicator {
      position: absolute;
      bottom: 16px;
      left: 0;
      width: 360px;
      text-align: center;
      color: #eaf4ff;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .lock-badge {
      position: absolute;
      top: 52px;
      right: 24px;
      color: #ffb8b8;
      font-size: 11px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>
  <div class="watch">
    <div class="mode-toggle" id="modeToggle">G</div>

    <div class="lock-badge" id="lockBadge">LOCKED</div>

    <div class="sets-board">
      <div class="sets-row">
        <div class="sets-cell c0"></div>
        <div class="sets-cell c1">1</div>
        <div class="sets-cell c2">2</div>
        <div class="sets-cell c3">3</div>
      </div>
      <div class="sets-row">
        <div class="sets-cell c0">A</div>
        <div class="sets-cell c1" id="setA1">0</div>
        <div class="sets-cell c2" id="setA2">0</div>
        <div class="sets-cell c3" id="setA3">0</div>
      </div>
      <div class="sets-row">
        <div class="sets-cell c0">B</div>
        <div class="sets-cell c1" id="setB1">0</div>
        <div class="sets-cell c2" id="setB2">0</div>
        <div class="sets-cell c3" id="setB3">0</div>
      </div>
    </div>

    <div class="score-a" id="scoreA">0</div>
    <div class="score-b" id="scoreB">0</div>

    <div class="controls">
      <div class="small-btn" id="resetBtn">R</div>
      <div class="small-btn" id="undoBtn">U</div>
      <div class="small-btn" id="lockBtn">L</div>
    </div>

    <div class="set-indicator" id="setIndicator">SET 1</div>
  </div>

  <script>
    var state = {
      pointA: 0,
      pointB: 0,
      sets: [
        { a: 0, b: 0 },
        { a: 0, b: 0 },
        { a: 0, b: 0 }
      ],
      currentSet: 0,
      locked: false,
      mode: "golden"
    };

    var history = [];
    var resetPressTimer = null;

    var scoreAEl = document.getElementById("scoreA");
    var scoreBEl = document.getElementById("scoreB");
    var resetBtn = document.getElementById("resetBtn");
    var undoBtn = document.getElementById("undoBtn");
    var lockBtn = document.getElementById("lockBtn");
    var modeToggle = document.getElementById("modeToggle");
    var setIndicator = document.getElementById("setIndicator");
    var lockBadge = document.getElementById("lockBadge");

    var setEls = {
      a1: document.getElementById("setA1"),
      a2: document.getElementById("setA2"),
      a3: document.getElementById("setA3"),
      b1: document.getElementById("setB1"),
      b2: document.getElementById("setB2"),
      b3: document.getElementById("setB3")
    };

    function cloneState(s) {
      return JSON.parse(JSON.stringify(s));
    }

    function saveHistory() {
      history.push(cloneState(state));
    }

    function isDeuceState() {
      return state.pointA >= 3 && state.pointB >= 3;
    }

    function currentSetFinished(setObj) {
      var a = setObj.a;
      var b = setObj.b;
      return (a >= 6 || b >= 6) && Math.abs(a - b) >= 2;
    }

    function advanceSetIfNeeded() {
      var setObj = state.sets[state.currentSet];
      if (currentSetFinished(setObj) && state.currentSet < 2) {
        state.currentSet += 1;
      }
    }

    function winGame(team) {
      var setObj = state.sets[state.currentSet];
      if (team === "A") setObj.a += 1;
      else setObj.b += 1;

      state.pointA = 0;
      state.pointB = 0;
      advanceSetIfNeeded();
    }

    function incrementA() {
      if (state.locked) return;
      saveHistory();
      if (state.mode === "golden") incrementAGolden();
      else incrementANormal();
      render();
    }

    function incrementB() {
      if (state.locked) return;
      saveHistory();
      if (state.mode === "golden") incrementBGolden();
      else incrementBNormal();
      render();
    }

    function incrementAGolden() {
      if (state.pointA <= 2) {
        state.pointA += 1;
        return;
      }
      if (state.pointA === 3 && state.pointB < 3) {
        winGame("A");
        return;
      }
      if (state.pointA === 3 && state.pointB === 3) {
        winGame("A");
      }
    }

    function incrementBGolden() {
      if (state.pointB <= 2) {
        state.pointB += 1;
        return;
      }
      if (state.pointB === 3 && state.pointA < 3) {
        winGame("B");
        return;
      }
      if (state.pointA === 3 && state.pointB === 3) {
        winGame("B");
      }
    }

    function incrementANormal() {
      if (!isDeuceState()) {
        if (state.pointA <= 2) {
          state.pointA += 1;
          return;
        }
        if (state.pointA === 3 && state.pointB < 3) {
          winGame("A");
          return;
        }
        if (state.pointA === 3 && state.pointB === 3) {
          state.pointA = 4;
          return;
        }
      } else {
        if (state.pointA === state.pointB) {
          state.pointA += 1;
        } else if (state.pointA > state.pointB) {
          winGame("A");
        } else {
          state.pointA = 3;
          state.pointB = 3;
        }
      }
    }

    function incrementBNormal() {
      if (!isDeuceState()) {
        if (state.pointB <= 2) {
          state.pointB += 1;
          return;
        }
        if (state.pointB === 3 && state.pointA < 3) {
          winGame("B");
          return;
        }
        if (state.pointA === 3 && state.pointB === 3) {
          state.pointB = 4;
          return;
        }
      } else {
        if (state.pointA === state.pointB) {
          state.pointB += 1;
        } else if (state.pointB > state.pointA) {
          winGame("B");
        } else {
          state.pointA = 3;
          state.pointB = 3;
        }
      }
    }

    function getDisplayScore(team) {
      var a = state.pointA;
      var b = state.pointB;

      if (state.mode === "golden") {
        var labels = ["0", "15", "30", "40"];
        return team === "A" ? labels[Math.min(a, 3)] : labels[Math.min(b, 3)];
      }

      if (a >= 3 && b >= 3) {
        if (a === b) return "D";
        if (team === "A") return a > b ? "A" : "40";
        return b > a ? "A" : "40";
      }

      var labels2 = ["0", "15", "30", "40", "A"];
      return team === "A" ? labels2[a] : labels2[b];
    }

    function resetAll() {
      saveHistory();
      state = {
        pointA: 0,
        pointB: 0,
        sets: [
          { a: 0, b: 0 },
          { a: 0, b: 0 },
          { a: 0, b: 0 }
        ],
        currentSet: 0,
        locked: false,
        mode: state.mode
      };
      render();
    }

    function undo() {
      if (history.length === 0) return;
      state = history.pop();
      render();
    }

    function toggleLock() {
      state.locked = !state.locked;
      render();
    }

    function toggleMode() {
      saveHistory();
      state.mode = state.mode === "golden" ? "normal" : "golden";
      state.pointA = 0;
      state.pointB = 0;
      render();
    }

    function startResetHold() {
      resetBtn.className = "small-btn holding";
      resetPressTimer = setTimeout(function() {
        resetBtn.className = "small-btn";
        resetAll();
      }, 900);
    }

    function cancelResetHold() {
      clearTimeout(resetPressTimer);
      resetBtn.className = "small-btn";
    }

    function render() {
      scoreAEl.textContent = getDisplayScore("A");
      scoreBEl.textContent = getDisplayScore("B");

      setEls.a1.textContent = state.sets[0].a;
      setEls.a2.textContent = state.sets[1].a;
      setEls.a3.textContent = state.sets[2].a;
      setEls.b1.textContent = state.sets[0].b;
      setEls.b2.textContent = state.sets[1].b;
      setEls.b3.textContent = state.sets[2].b;

      setIndicator.textContent = "SET " + Math.min(state.currentSet + 1, 3);

      if (state.locked) {
        lockBtn.className = "small-btn locked";
        lockBadge.style.display = "block";
        scoreAEl.className = "score-a score-btn disabled";
        scoreBEl.className = "score-b score-btn disabled";
      } else {
        lockBtn.className = "small-btn";
        lockBadge.style.display = "none";
        scoreAEl.className = "score-a score-btn";
        scoreBEl.className = "score-b score-btn";
      }

      modeToggle.className = state.mode === "normal" ? "mode-toggle normal" : "mode-toggle";
      modeToggle.textContent = state.mode === "golden" ? "G" : "N";
    }

    scoreAEl.onclick = incrementA;
    scoreBEl.onclick = incrementB;
    undoBtn.onclick = undo;
    lockBtn.onclick = toggleLock;
    modeToggle.onclick = toggleMode;

    resetBtn.onmousedown = startResetHold;
    resetBtn.onmouseup = cancelResetHold;
    resetBtn.onmouseleave = cancelResetHold;

    resetBtn.ontouchstart = function(e) {
      e.preventDefault();
      startResetHold();
    };

    resetBtn.ontouchend = function(e) {
      e.preventDefault();
      cancelResetHold();
    };

    resetBtn.ontouchcancel = cancelResetHold;

    render();
  </script>
</body>
</html>
