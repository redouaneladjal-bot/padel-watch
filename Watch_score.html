<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>PadelTap V20</title>
<style>
  :root{
    --bg:#123cbe;
    --yellow:#f2c300;
    --grey:#e9deef;
    --blue:#66d2ff;
    --blueBorder:#2c7aa8;
    --text:#f3f8ff;
    --textDark:#123047;
    --grid:rgba(255,255,255,0.45);
    --lock:#9b2b2b;
    --lockBorder:#6f1717;
    --glass:rgba(255,255,255,.18);
    --glassBorder:rgba(255,255,255,.28);
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:Arial,Helvetica,sans-serif;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    user-select:none;
  }

  #app{
    position:relative;
    width:100vw;
    height:100vh;
    background:var(--bg);
    overflow:hidden;
  }

  .pill{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    background:var(--glass);
    border:2px solid var(--glassBorder);
    border-radius:16px;
  }

  .circle-btn{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    border-radius:50%;
  }

  .mode{
    top:4%;
    left:28%;
    width:60px;
    height:30px;
    font-size:14px;
  }

  .modeLabel{
    position:absolute;
    top:13%;
    left:31%;
    font-size:11px;
    color:white;
    font-weight:bold;
  }

  .lock{
    top:4%;
    left:48%;
    width:50px;
    height:50px;
    font-size:18px;
  }

  .lock.locked{
    background:var(--lock);
    border-color:var(--lockBorder);
  }

  .audio{
    top:4%;
    left:64%;
    width:42px;
    height:30px;
    border-radius:16px;
    font-size:14px;
  }

  .server{
    top:67%;
    left:34%;
    width:82px;
    height:30px;
    font-size:12px;
  }

  .setLabel{
    position:absolute;
    left:12%;
    top:18%;
    font-weight:bold;
    color:white;
    font-size:13px;
  }

  .sets{
    position:absolute;
    left:11%;
    top:26%;
    width:35%;
    color:white;
  }

  .row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
  }

  .cell{
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
  }

  .head{
    font-size:15px;
    font-weight:bold;
  }

  .row:not(:last-child) .cell{
    border-bottom:1px solid var(--grid);
  }

  .row .cell:not(:last-child){
    border-right:1px solid var(--grid);
  }

  .score{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    color:var(--textDark);
  }

  .scoreA{
    top:20%;
    left:58%;
    background:var(--yellow);
    box-shadow:0 0 0 5px white;
  }

  .scoreB{
    top:54%;
    left:58%;
    background:var(--grey);
  }

  .disabled{
    opacity:.72;
    filter:grayscale(0.08);
  }

  .reset{
    top:66%;
    left:13%;
    width:60px;
    height:60px;
    font-size:22px;
  }

  .undo{
    top:80%;
    left:44%;
    width:60px;
    height:60px;
    font-size:22px;
    transform:translateX(-50%);
  }

  .holding{
    background:var(--lock) !important;
    border-color:var(--lockBorder) !important;
  }
</style>
</head>
<body>

<div id="app">
  <div class="pill mode" id="modeBtn">G</div>
  <div class="modeLabel" id="modeLabel">G - Golden</div>

  <div class="circle-btn lock" id="lockBtn">L</div>
  <div class="pill audio" id="audioBtn">A</div>

  <div class="pill server" id="serverBtn">Srv A</div>

  <div class="setLabel" id="setLabel">SET 1</div>

  <div class="sets">
    <div class="row">
      <div class="cell head">1</div>
      <div class="cell head">2</div>
      <div class="cell head">3</div>
    </div>
    <div class="row">
      <div class="cell" id="setA1">0</div>
      <div class="cell" id="setA2">0</div>
      <div class="cell" id="setA3">0</div>
    </div>
    <div class="row">
      <div class="cell" id="setB1">0</div>
      <div class="cell" id="setB2">0</div>
      <div class="cell" id="setB3">0</div>
    </div>
  </div>

  <div class="score scoreA" id="scoreA">0</div>
  <div class="score scoreB" id="scoreB">0</div>

  <div class="circle-btn reset" id="resetBtn">R</div>
  <div class="circle-btn undo" id="undoBtn">U</div>
</div>

<script>
(function () {
  const state = {
    pointA: 0,
    pointB: 0,
    sets: [
      { a: 0, b: 0 },
      { a: 0, b: 0 },
      { a: 0, b: 0 }
    ],
    currentSet: 0,
    locked: false,
    mode: "golden",
    matchFinished: false,
    audioEnabled: true,
    server: "A"
  };

  const history = [];
  let resetTimer = null;
  let undoTimer = null;

  const els = {
    scoreA: document.getElementById("scoreA"),
    scoreB: document.getElementById("scoreB"),
    modeBtn: document.getElementById("modeBtn"),
    modeLabel: document.getElementById("modeLabel"),
    lockBtn: document.getElementById("lockBtn"),
    audioBtn: document.getElementById("audioBtn"),
    serverBtn: document.getElementById("serverBtn"),
    resetBtn: document.getElementById("resetBtn"),
    undoBtn: document.getElementById("undoBtn"),
    setLabel: document.getElementById("setLabel"),
    setA1: document.getElementById("setA1"),
    setA2: document.getElementById("setA2"),
    setA3: document.getElementById("setA3"),
    setB1: document.getElementById("setB1"),
    setB2: document.getElementById("setB2"),
    setB3: document.getElementById("setB3")
  };

  function vibrate(pattern) {
    try {
      if (navigator.vibrate) navigator.vibrate(pattern || 30);
    } catch (_) {}
  }

  function speak(text) {
    if (!state.audioEnabled) return;
    try {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      utter.rate = 1;
      utter.pitch = 1;
      speechSynthesis.speak(utter);
    } catch (_) {}
  }

  function cloneState() {
    return JSON.parse(JSON.stringify(state));
  }

  function saveHistory() {
    history.push(cloneState());
    if (history.length > 100) history.shift();
  }

  function bindTap(el, handler) {
    let touched = false;

    el.addEventListener("touchstart", function (e) {
      touched = true;
      e.preventDefault();
      handler();
    }, { passive: false });

    el.addEventListener("click", function (e) {
      if (touched) {
        touched = false;
        return;
      }
      e.preventDefault();
      handler();
    });
  }

  function tennisWord(v) {
    if (v === 0) return "love";
    if (v === 1) return "15";
    if (v === 2) return "30";
    return "40";
  }

  function setOrdinal(index) {
    if (index === 0) return "first";
    if (index === 1) return "second";
    return "third";
  }

  function isDeuceState() {
    return state.pointA >= 3 && state.pointB >= 3;
  }

  function currentSetFinished(setObj) {
    return (setObj.a >= 6 || setObj.b >= 6) && Math.abs(setObj.a - setObj.b) >= 2;
  }

  function getDisplayScore(team) {
    if (state.matchFinished) return "0";

    const a = state.pointA;
    const b = state.pointB;

    if (state.mode === "golden") {
      const labels = ["0", "15", "30", "40"];
      return team === "A" ? labels[Math.min(a, 3)] : labels[Math.min(b, 3)];
    }

    if (a >= 3 && b >= 3) {
      if (a === b) return "D";
      if (team === "A") return a > b ? "A" : "40";
      return b > a ? "A" : "40";
    }

    const labels = ["0", "15", "30", "40", "A"];
    return team === "A" ? labels[a] : labels[b];
  }

  function advanceSetIfNeeded() {
    const current = state.sets[state.currentSet];
    if (!currentSetFinished(current)) return;

    if (state.currentSet < 2) {
      state.currentSet += 1;
    } else {
      state.matchFinished = true;
    }
  }

  function announcePoint() {
    if (state.matchFinished) return;

    if (state.mode === "normal" && state.pointA >= 3 && state.pointB >= 3) {
      if (state.pointA === state.pointB) {
        speak("deuce");
        return;
      }
      const advTeam = state.pointA > state.pointB ? "A" : "B";
      speak(advTeam === state.server ? "advantage server" : "advantage receiver");
      return;
    }

    const aText = tennisWord(state.pointA);
    const bText = tennisWord(state.pointB);

    const first = state.server === "A" ? aText : bText;
    const second = state.server === "A" ? bText : aText;

    if (first === second) {
      speak(first + " all");
    } else {
      speak(first + " " + second);
    }
  }

  function currentVisibleSetScores() {
    const limit = Math.min(state.currentSet, 2);
    const arr = [];
    for (let i = 0; i <= limit; i++) {
      arr.push(state.sets[i].a + " " + state.sets[i].b);
    }
    return arr;
  }

  function announceGameOrSet(team, finishedSetNow, matchFinishedNow, setIndexJustWon) {
    if (matchFinishedNow) {
      const finalScores = state.sets.map(s => s.a + " " + s.b).join(", ");
      speak("game, third set, and match Team " + team + ". Final set score " + finalScores);
      return;
    }

    if (finishedSetNow) {
      speak(
        "game and " + setOrdinal(setIndexJustWon) + " set Team " + team +
        ". Set score " + currentVisibleSetScores().join(", ")
      );
      return;
    }

    speak(
      "game Team " + team +
      ". Set score " + currentVisibleSetScores().join(", ")
    );
  }

  function winGame(team) {
    if (state.matchFinished) return;

    const oldSetIndex = state.currentSet;
    const current = state.sets[state.currentSet];

    if (team === "A") current.a += 1;
    else current.b += 1;

    state.pointA = 0;
    state.pointB = 0;

    const setJustFinished = currentSetFinished(current);
    advanceSetIfNeeded();

    if (state.matchFinished) {
      announceGameOrSet(team, true, true, oldSetIndex);
      return;
    }

    if (setJustFinished && state.currentSet !== oldSetIndex) {
      announceGameOrSet(team, true, false, oldSetIndex);
    } else {
      announceGameOrSet(team, false, false, oldSetIndex);
    }

    state.server = state.server === "A" ? "B" : "A";
  }

  function incrementAGolden() {
    if (state.pointA <= 2) {
      state.pointA += 1;
      return;
    }
    if (state.pointA === 3 && state.pointB < 3) {
      winGame("A");
      return;
    }
    if (state.pointA === 3 && state.pointB === 3) {
      winGame("A");
    }
  }

  function incrementBGolden() {
    if (state.pointB <= 2) {
      state.pointB += 1;
      return;
    }
    if (state.pointB === 3 && state.pointA < 3) {
      winGame("B");
      return;
    }
    if (state.pointA === 3 && state.pointB === 3) {
      winGame("B");
    }
  }

  function incrementANormal() {
    if (!isDeuceState()) {
      if (state.pointA <= 2) {
        state.pointA += 1;
        return;
      }
      if (state.pointA === 3 && state.pointB < 3) {
        winGame("A");
        return;
      }
      if (state.pointA === 3 && state.pointB === 3) {
        state.pointA = 4;
        return;
      }
    } else {
      if (state.pointA === state.pointB) state.pointA += 1;
      else if (state.pointA > state.pointB) winGame("A");
      else {
        state.pointA = 3;
        state.pointB = 3;
      }
    }
  }

  function incrementBNormal() {
    if (!isDeuceState()) {
      if (state.pointB <= 2) {
        state.pointB += 1;
        return;
      }
      if (state.pointB === 3 && state.pointA < 3) {
        winGame("B");
        return;
      }
      if (state.pointA === 3 && state.pointB === 3) {
        state.pointB = 4;
        return;
      }
    } else {
      if (state.pointA === state.pointB) state.pointB += 1;
      else if (state.pointB > state.pointA) winGame("B");
      else {
        state.pointA = 3;
        state.pointB = 3;
      }
    }
  }

  function incrementA() {
    if (state.locked || state.matchFinished) return;
    saveHistory();

    const beforeSets = JSON.stringify(state.sets);

    if (state.mode === "golden") incrementAGolden();
    else incrementANormal();

    vibrate(25);

    const afterSets = JSON.stringify(state.sets);
    if (beforeSets === afterSets && !state.matchFinished) announcePoint();

    render();
  }

  function incrementB() {
    if (state.locked || state.matchFinished) return;
    saveHistory();

    const beforeSets = JSON.stringify(state.sets);

    if (state.mode === "golden") incrementBGolden();
    else incrementBNormal();

    vibrate(25);

    const afterSets = JSON.stringify(state.sets);
    if (beforeSets === afterSets && !state.matchFinished) announcePoint();

    render();
  }

  function toggleMode() {
    saveHistory();
    state.mode = state.mode === "golden" ? "normal" : "golden";
    state.pointA = 0;
    state.pointB = 0;
    vibrate(35);
    render();
    speak(state.mode === "golden" ? "golden point" : "normal mode");
  }

  function toggleLock() {
    state.locked = !state.locked;
    vibrate(35);
    render();
    speak(state.locked ? "locked" : "unlocked");
  }

  function toggleAudio() {
    const wasEnabled = state.audioEnabled;
    state.audioEnabled = !state.audioEnabled;
    vibrate(35);
    render();

    if (!wasEnabled && state.audioEnabled) speak("audio on");
  }

  function toggleServer() {
    state.server = state.server === "A" ? "B" : "A";
    vibrate(35);
    render();
    speak("server " + state.server);
  }

  function doReset() {
    saveHistory();
    state.pointA = 0;
    state.pointB = 0;
    state.sets = [
      { a: 0, b: 0 },
      { a: 0, b: 0 },
      { a: 0, b: 0 }
    ];
    state.currentSet = 0;
    state.matchFinished = false;
    state.server = "A";
    vibrate([40,40,40]);
    render();
    speak("match reset");
  }

  function doUndo() {
    if (history.length === 0) return;
    const previousAudio = state.audioEnabled;
    const previous = history.pop();
    Object.keys(state).forEach(k => delete state[k]);
    Object.assign(state, previous);
    state.audioEnabled = previousAudio;
    vibrate([30,30]);
    render();
    speak("undo");
  }

  function render() {
    els.scoreA.textContent = getDisplayScore("A");
    els.scoreB.textContent = getDisplayScore("B");

    els.setA1.textContent = state.sets[0].a;
    els.setA2.textContent = state.sets[1].a;
    els.setA3.textContent = state.sets[2].a;
    els.setB1.textContent = state.sets[0].b;
    els.setB2.textContent = state.sets[1].b;
    els.setB3.textContent = state.sets[2].b;

    els.setLabel.textContent = "SET " + Math.min(state.currentSet + 1, 3);
    els.modeBtn.textContent = state.mode === "golden" ? "G" : "N";
    els.modeLabel.textContent = state.mode === "golden" ? "G - Golden" : "N - Normal";
    els.audioBtn.textContent = state.audioEnabled ? "A" : "M";
    els.serverBtn.textContent = state.server === "A" ? "Srv A" : "Srv B";

    if (state.locked || state.matchFinished) {
      els.scoreA.classList.add("disabled");
      els.scoreB.classList.add("disabled");
    } else {
      els.scoreA.classList.remove("disabled");
      els.scoreB.classList.remove("disabled");
    }

    if (state.locked) els.lockBtn.classList.add("locked");
    else els.lockBtn.classList.remove("locked");
  }

  bindTap(els.scoreA, incrementA);
  bindTap(els.scoreB, incrementB);
  bindTap(els.modeBtn, toggleMode);
  bindTap(els.lockBtn, toggleLock);
  bindTap(els.audioBtn, toggleAudio);
  bindTap(els.serverBtn, toggleServer);
  bindTap(els.undoBtn, doUndo);

  els.resetBtn.addEventListener("touchstart", function (e) {
    e.preventDefault();
    els.resetBtn.classList.add("holding");
    resetTimer = setTimeout(doReset, 800);
  }, { passive:false });

  els.resetBtn.addEventListener("touchend", function () {
    clearTimeout(resetTimer);
    els.resetBtn.classList.remove("holding");
  });

  els.resetBtn.addEventListener("touchcancel", function () {
    clearTimeout(resetTimer);
    els.resetBtn.classList.remove("holding");
  });

  els.undoBtn.addEventListener("touchstart", function (e) {
    e.preventDefault();
    els.undoBtn.classList.add("holding");
    undoTimer = setTimeout(doUndo, 600);
  }, { passive:false });

  els.undoBtn.addEventListener("touchend", function () {
    clearTimeout(undoTimer);
    els.undoBtn.classList.remove("holding");
  });

  els.undoBtn.addEventListener("touchcancel", function () {
    clearTimeout(undoTimer);
    els.undoBtn.classList.remove("holding");
  });

  render();
})();
</script>
</body>
</html>
