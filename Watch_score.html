<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>PadelTap V49</title>
<style>
  :root{
    --bg:#123cbe;
    --yellow:#f2c300;
    --grey:#e9deef;
    --blue:#66d2ff;
    --blueBorder:#2c7aa8;
    --text:#f3f8ff;
    --textDark:#123047;
    --grid:rgba(255,255,255,0.45);
    --lock:#9b2b2b;
    --lockBorder:#6f1717;
    --glass:rgba(255,255,255,.18);
    --glassBorder:rgba(255,255,255,.28);
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:Arial,Helvetica,sans-serif;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    user-select:none;
  }

  #app{
    position:relative;
    width:100vw;
    height:100vh;
    background:var(--bg);
    overflow:hidden;
  }

  .pill{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    background:var(--glass);
    border:2px solid var(--glassBorder);
    border-radius:16px;
  }

  .circle-btn{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    border-radius:50%;
  }

  .mode.tb-active{
    background:rgba(242,195,0,0.35);
    border-color:var(--yellow);
    color:var(--yellow);
  }

  .mode.stb-active{
    background:rgba(242,195,0,0.6);
    border-color:var(--yellow);
    color:var(--yellow);
  }

  .mode{
    top:5.5%;
    left:26%;
    width:64px;
    height:30px;
    font-size:12px;
    font-weight:bold;
  }

  .modeLabel{
    position:absolute;
    top:13%;
    left:31%;
    font-size:11px;
    color:white;
    font-weight:bold;
  }

  .audio{
    top:5.5%;
    left:47%;
    width:52px;
    height:30px;
    border-radius:16px;
    font-size:12px;
  }

  .tbreak-btn{
    top:19%;
    left:28%;
    width:50px;
    height:24px;
    border-radius:12px;
    font-size:10px;
    font-weight:bold;
  }

  .tbreak-btn.tb-on{
    background:rgba(255,140,0,0.5);
    border-color:#ff8c00;
    color:#ffd080;
  }

  .sets-btn{
    top:5.5%;
    left:65%;
    width:44px;
    height:30px;
    border-radius:16px;
    font-size:10px;
    font-weight:bold;
  }

  .sets-btn.bo5{
    background:rgba(242,195,0,0.3);
    border-color:var(--yellow);
    color:var(--yellow);
  }



  .server{
    top:67%;
    left:34%;
    width:82px;
    height:30px;
    font-size:12px;
  }

  .setLabel{
    position:absolute;
    left:12%;
    top:18%;
    font-weight:bold;
    color:white;
    font-size:13px;
  }

  .sets{
    position:absolute;
    left:9%;
    top:26%;
    width:40%;
    color:white;
  }

  .setsTable{
    display:table;
    width:100%;
    border-collapse:collapse;
  }

  .setsRow{
    display:table-row;
  }

  .setsCell{
    display:table-cell;
    height:38px;
    vertical-align:middle;
    text-align:center;
    font-size:20px;
    border-right:1px solid var(--grid);
  }

  .setsCell:last-child{ border-right:none; }

  .setsRow:not(:last-child) .setsCell{
    border-bottom:1px solid var(--grid);
  }

  .setsLabelCell{
    display:table-cell;
    width:18px;
    height:38px;
    vertical-align:middle;
    text-align:center;
    font-size:12px;
    font-weight:bold;
    padding-right:3px;
    border-right:3px solid;
  }

  .setsLabelCell.labelA{
    color:var(--grey);
    border-color:var(--grey);
  }

  .setsLabelCell.labelB{
    color:var(--yellow);
    border-color:var(--yellow);
  }

  .setsHead{
    font-size:15px;
    font-weight:bold;
  }

  .headLabel{
    display:table-cell;
    width:18px;
    padding-right:3px;
  }





  .row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
  }

  .cell{
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
  }

  .head{
    font-size:15px;
    font-weight:bold;
  }

  .row:not(:last-child) .cell{
    border-bottom:1px solid var(--grid);
  }

  .row .cell:not(:last-child){
    border-right:1px solid var(--grid);
  }

  .score{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    color:var(--textDark);
  }

  .scoreA{
    top:20%;
    left:58%;
    background:var(--grey);
    box-shadow:0 0 0 5px white;
  }

  .scoreB{
    top:54%;
    left:58%;
    background:var(--yellow);
  }

  .disabled{
    opacity:.72;
    filter:grayscale(0.08);
  }

  .reset{
    top:66%;
    left:13%;
    width:60px;
    height:60px;
    font-size:22px;
  }

  .undo{
    top:80%;
    left:44%;
    width:60px;
    height:60px;
    font-size:22px;
    transform:translateX(-50%);
  }

  .holding{
    background:var(--lock) !important;
    border-color:var(--lockBorder) !important;
  }

  .server.disabled-btn{
    opacity:0.35;
    pointer-events:none;
  }

  /* ── Server ball indicator ── */
  #serverBall{
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--yellow);
    border:2px solid white;
    box-shadow:0 0 6px rgba(0,0,0,0.4);
    transition: top 0.35s cubic-bezier(.4,0,.2,1), left 0.35s cubic-bezier(.4,0,.2,1);
    z-index:5;
    pointer-events:none;
  }

  /* ── Match finished overlay ── */
  #matchOverlay{
    display:none;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.88);
    z-index:100;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:16px;
    text-align:center;
  }

  #matchOverlay.show{ display:flex; }

  #matchOverlay h1{
    color:var(--yellow);
    font-size:28px;
    margin:0;
  }

  #matchOverlay .winner{
    color:white;
    font-size:22px;
    font-weight:bold;
  }

  #matchOverlay .finalScore{
    color:white;
    font-size:16px;
  }

  #overlayHistory{
    width:100%;
    margin:4px 0 6px 0;
    font-size:13px;
    color:white;
  }
  .hist-set-title{
    color:var(--yellow);
    font-weight:bold;
    font-size:12px;
    margin:6px 0 2px 0;
    text-align:left;
  }
  .hist-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:2px 4px;
    border-radius:4px;
    font-size:13px;
  }
  .hist-row.winner-a{ background:rgba(233,222,239,0.15); }
  .hist-row.winner-b{ background:rgba(242,195,0,0.15); }
  .hist-score{
    font-weight:bold;
    font-size:15px;
    letter-spacing:2px;
  }
  .hist-score .ha{ color:var(--grey); }
  .hist-score .hb{ color:var(--yellow); }
  #overlayStats{
    margin:6px 0 4px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:14px;
  }
  .stat-num-a{ color:var(--grey); font-size:20px; font-weight:bold; }
  .stat-num-b{ color:var(--yellow); font-size:20px; font-weight:bold; }
  .stat-label{ color:rgba(255,255,255,0.6); font-size:11px; text-align:center; }
  #matchOverlay .resetOverlayBtn{
    margin-top:8px;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    border-radius:12px;
    color:var(--textDark);
    font-size:18px;
    font-weight:bold;
    padding:10px 32px;
    cursor:pointer;
  }
  /* ── Set/Match point banner ── */
  #banner{
    position:absolute; top:0; left:0; right:0;
    background:rgba(242,195,0,0.95); color:#123047;
    font-size:11px; font-weight:bold; text-align:center;
    padding:3px 0; z-index:50;
    transform:translateY(-100%);
    transition:transform 0.3s ease;
  }
  #banner.show{ transform:translateY(0); }
</style>
</head>
<body>

<div id="app">
  <div id="banner"></div>
  <div class="pill mode" id="modeBtn">G</div>
  <div class="pill audio" id="audioBtn">EN</div>
  <div class="pill tbreak-btn" id="tbreakBtn">TB</div>
  <div class="pill sets-btn" id="setsBtn">S2</div>

  <div class="pill server" id="serverBtn">Srv A</div>

  <div class="setLabel" id="setLabel">SET 1</div>

  <div class="sets">
    <div class="setsTable">
      <!-- Header row -->
      <div class="setsRow">
        <div class="headLabel"></div>
        <div class="setsCell setsHead" id="setH1">1</div>
        <div class="setsCell setsHead" id="setH2">2</div>
        <div class="setsCell setsHead" id="setH3">3</div>
      </div>
      <!-- Row A -->
      <div class="setsRow" id="rowA">
        <div class="setsLabelCell labelA">A</div>
        <div class="setsCell" id="setA1">0</div>
        <div class="setsCell" id="setA2">0</div>
        <div class="setsCell" id="setA3">0</div>
      </div>
      <!-- Row B -->
      <div class="setsRow" id="rowB">
        <div class="setsLabelCell labelB">B</div>
        <div class="setsCell" id="setB1">0</div>
        <div class="setsCell" id="setB2">0</div>
        <div class="setsCell" id="setB3">0</div>
      </div>
    </div>
  </div>

  <div class="score scoreA" id="scoreA">0</div>
  <div class="score scoreB" id="scoreB">0</div>

  <!-- Server ball indicator -->
  <div id="serverBall"></div>

  <div class="circle-btn reset" id="resetBtn">R</div>
  <div class="circle-btn undo" id="undoBtn">U</div>

  <div id="matchOverlay">
    <h1>MATCH FINI</h1>
    <div class="winner" id="overlayWinner"></div>
    <div class="finalScore" id="overlayScore"></div>
    <div id="overlayStats"></div>
    <div style="display:flex;gap:12px;margin-top:8px;">
      <div class="resetOverlayBtn" id="undoOverlayBtn">↩ Undo</div>
      <div class="resetOverlayBtn" id="resetOverlayBtn">Reset</div>
    </div>
  </div>
</div>


</html>
<script>
(function(){

const T={
  EN:{love:"love",f15:"15",f30:"30",f40:"40",deuce:"Deuce",advServer:"Advantage server",advReceiver:"Advantage receiver",winsGame:(t,s,srv)=>[`Team ${t} wins the game.`,`${s}.`,`Team ${srv} to serve`],winsSet:(t,s,srv)=>[`Set Team ${t}.`,`${s}.`,`Team ${srv} to serve`],winsMatch:(t,s)=>[`Game set and match Team ${t}!`,`Final score ${s}`],setPoint:(t)=>`Set point Team ${t}`,matchPoint:(t)=>`Match point Team ${t}`,undo:"Undo",reset:"Match reset",locked:"Locked",unlocked:"Unlocked",golden:"Golden point",normal:"Normal mode",audioOn:"Audio on",srvTeam:(t)=>`Team ${t} to serve`},
  FR:{love:"zéro",f15:"quinze",f30:"trente",f40:"quarante",deuce:"Égalité",advServer:"Avantage serveur",advReceiver:"Avantage receveur",winsGame:(t,s,srv)=>[`Jeu équipe ${t}.`,`${s}.`,`Équipe ${srv} au service`],winsSet:(t,s,srv)=>[`Jeu et set équipe ${t}.`,`${s}.`,`Équipe ${srv} au service`],winsMatch:(t,s)=>[`Jeu set et match équipe ${t} !`,`Score final ${s}`],setPoint:(t)=>`Balle de set équipe ${t}`,matchPoint:(t)=>`Balle de match équipe ${t}`,undo:"Annuler",reset:"Match réinitialisé",locked:"Verrouillé",unlocked:"Déverrouillé",golden:"Point d'or",normal:"Mode normal",audioOn:"Audio activé",srvTeam:(t)=>`Équipe ${t} au service`}
};

// Audio mode cycles: EN → FR → MUTE → EN
const AUDIO_MODES = ["EN","FR","MUTE"];

const state={
  pointA:0,pointB:0,
  sets:Array(5).fill(null).map(()=>({a:0,b:0})),
  currentSet:0,gameMode:"golden",tieBreak:false,
  matchFinished:false,
  server:"A",winner:null,setsToWin:2,
  servePos:"right",matchStarted:false,
  audioMode:"EN",  // EN | FR | MUTE
  gameHistory:[],
  totalPointsA:0,
  totalPointsB:0
};
const history=[];
let resetTimer=null,speechQueue=[],bannerTimer=null;

// Helpers
function lang(){ return state.audioMode==="MUTE" ? "EN" : state.audioMode; }
function isMuted(){ return state.audioMode==="MUTE"; }
function t(){ return T[lang()]; }

const ids=id=>document.getElementById(id);
const els={
  scoreA:ids("scoreA"),scoreB:ids("scoreB"),
  modeBtn:ids("modeBtn"),modeLabel:ids("modeLabel"),
  audioBtn:ids("audioBtn"),
  serverBtn:ids("serverBtn"),resetBtn:ids("resetBtn"),undoBtn:ids("undoBtn"),
  setLabel:ids("setLabel"),
  setH1:ids("setH1"),setH2:ids("setH2"),setH3:ids("setH3"),
  setA1:ids("setA1"),setA2:ids("setA2"),setA3:ids("setA3"),
  setB1:ids("setB1"),setB2:ids("setB2"),setB3:ids("setB3"),
  matchOverlay:ids("matchOverlay"),overlayWinner:ids("overlayWinner"),
  overlayScore:ids("overlayScore"),resetOverlayBtn:ids("resetOverlayBtn"),
  undoOverlayBtn:ids("undoOverlayBtn"),
  overlayStats:ids("overlayStats"),
  tbreakBtn:ids("tbreakBtn"),
  setsBtn:ids("setsBtn"),
  banner:ids("banner")
};

// ── Speech ────────────────────────────────────────────────────────────────────
function pickVoice(l){const v=speechSynthesis.getVoices()||[];if(l==="FR")return v.find(x=>/fr[-_]?FR/i.test(x.lang))||v.find(x=>/^fr/i.test(x.lang))||null;return v.find(x=>/en[-_]?US/i.test(x.lang)&&/google|samsung/i.test(x.name))||v.find(x=>/^en/i.test(x.lang))||null;}

function speakNext(){
  if(!speechQueue.length||isMuted()){speechQueue=[];return;}
  const text=speechQueue.shift();
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang()==="FR"?"fr-FR":"en-US";
    u.rate=0.82;u.pitch=0.92;u.volume=1.0;
    const v=pickVoice(lang());if(v)u.voice=v;
    u.onend=()=>setTimeout(speakNext,350);
    u.onerror=()=>setTimeout(speakNext,350);
    speechSynthesis.speak(u);
  }catch(_){setTimeout(speakNext,100);}
}
function speakSequence(phrases){
  if(isMuted())return;
  speechSynthesis.cancel();
  speechQueue=[...phrases];
  setTimeout(speakNext,200);
}
function speak(text){speakSequence([text]);}

// ── Banner ────────────────────────────────────────────────────────────────────
function showBanner(text){
  els.banner.textContent=text;
  els.banner.classList.add("show");
  clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>els.banner.classList.remove("show"),2500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function vibrate(p){try{if(navigator.vibrate)navigator.vibrate(p||30);}catch(_){}}
function cloneState(){return JSON.parse(JSON.stringify(state));}
function saveHistory(){history.push(cloneState());if(history.length>100)history.shift();}
function bindTap(el,fn){if(!el)return;let touched=false;el.addEventListener("touchstart",e=>{touched=true;e.preventDefault();fn();},{passive:false});el.addEventListener("click",e=>{if(touched){touched=false;return;}e.preventDefault();fn();});}
function scoreJoin(a,b){return lang()==="FR"?`${a} à ${b}`:`${a} to ${b}`;}
function tennisWord(v){if(v===0)return t().love;if(v===1)return t().f15;if(v===2)return t().f30;return t().f40;}
function isSetFinished(s){
  if(state.tieBreak){
    // At 7-6 or 6-7 = TB win
    if((s.a===7&&s.b===6)||(s.a===6&&s.b===7)) return true;
    // Normal set end (before 6-6)
    return (s.a>=6||s.b>=6)&&Math.abs(s.a-s.b)>=2&&!(s.a===6&&s.b===6);
  }
  return(s.a>=6||s.b>=6)&&Math.abs(s.a-s.b)>=2;
}
function setsWon(team){return state.sets.filter(s=>{if(!isSetFinished(s))return false;return team==="A"?s.a>s.b:s.b>s.a;}).length;}

function currentGameScoreStr(){
  const a=state.pointA,b=state.pointB;
  const gm=state.gameMode||"golden";
  if(isTBGame()){
    const first=state.server==="A"?a:b;
    const second=state.server==="A"?b:a;
    return `${first} ${lang()==="FR"?"à":"to"} ${second}`;
  }
  if(gm==="normal"&&a>=3&&b>=3){if(a===b)return t().deuce;const adv=a>b?"A":"B";return adv===state.server?t().advServer:t().advReceiver;}
  const aT=tennisWord(a),bT=tennisWord(b);
  const first=state.server==="A"?aT:bT,second=state.server==="A"?bT:aT;
  const allW=lang()==="FR"?"partout":"all";
  return first===second?`${first} ${allW}`:`${first} ${second}`;
}

function isOnePointFromGame(team){
  const a=state.pointA,b=state.pointB;
  const gm=state.gameMode||"golden";
  if(isTBGame()){
    if(team==="A") return (a+1>=7)&&(a+1-b)>=2;
    else           return (b+1>=7)&&(b+1-a)>=2;
  }
  if(team==="A"){if(gm==="golden")return a===3;return(a===3&&b<3)||a===4;}
  if(gm==="golden")return b===3;return(b===3&&a<3)||b===4;
}
function isOneGameFromSet(team){
  if(isTBGame()) return true;
  const c=state.sets[state.currentSet];
  if(state.tieBreak){
    // With TB: only set point at 5-x (not at 6-5 since 6-6 leads to TB)
    return team==="A"?(c.a===5&&c.a>c.b):(c.b===5&&c.b>c.a);
  }else{
    // Without TB: set point at 5-x AND at 6-5 (could win 7-5)
    if(team==="A") return (c.a===5&&c.a>c.b)||(c.a>=6&&c.a-c.b===1);
    return (c.b===5&&c.b>c.a)||(c.b>=6&&c.b-c.a===1);
  }
}

function checkSpecialPoint(){
  const sA=setsWon("A"),sB=setsWon("B");
  const spA=isOneGameFromSet("A")&&isOnePointFromGame("A");
  const spB=isOneGameFromSet("B")&&isOnePointFromGame("B");
  const needed=state.setsToWin||2;
  const mpA=sA===(needed-1)&&spA,mpB=sB===(needed-1)&&spB;
  const gs=currentGameScoreStr();
  if(mpA){const l=t().matchPoint("A");showBanner(l);speakSequence([gs,l]);return true;}
  if(mpB){const l=t().matchPoint("B");showBanner(l);speakSequence([gs,l]);return true;}
  if(spA){const l=t().setPoint("A");showBanner(l);speakSequence([gs,l]);return true;}
  if(spB){const l=t().setPoint("B");showBanner(l);speakSequence([gs,l]);return true;}
  return false;
}

function getDisplayScore(team){
  if(state.matchFinished)return"0";
  const gm=state.gameMode||"golden";
  if(isTBGame()){
    return team==="A"?String(state.pointA):String(state.pointB);
  }
  const a=state.pointA,b=state.pointB;
  if(gm==="golden"){const l=["0","15","30","40"];return team==="A"?l[Math.min(a,3)]:l[Math.min(b,3)];}
  if(gm==="normal"&&a>=3&&b>=3){if(a===b)return"D";if(team==="A")return a>b?"A":"40";return b>a?"A":"40";}
  const l=["0","15","30","40","A"];return team==="A"?l[a]:l[b];
}
function finalScoreStr(){const lim=Math.min(state.currentSet,4);return Array.from({length:lim+1},(_,i)=>scoreJoin(state.sets[i].a,state.sets[i].b)).join(", ");}
function announceGame(team,snap,setDone,matchNow){const srv=state.server;const gs=srv==="A"?scoreJoin(snap.a,snap.b):scoreJoin(snap.b,snap.a);if(matchNow){speakSequence(t().winsMatch(team,finalScoreStr()));return;}if(setDone){speakSequence(t().winsSet(team,gs,srv));return;}speakSequence(t().winsGame(team,gs,srv));}

function pointToDisplay(v, isWinner, gm){
  if(isTBGame()) return String(v);
  if(gm==="golden"){ const l=["0","15","30","40"]; return l[Math.min(v,3)]; }
  if(v===4) return "AD";
  const l=["0","15","30","40"]; return l[Math.min(v,3)];
}

function winGame(team){
  if(state.matchFinished)return;
  const setIdxAtWin = state.currentSet;
  const gm=state.gameMode||"golden";
  // Record game score with display values BEFORE resetting points
  const da = pointToDisplay(state.pointA, team==="A", gm);
  const db = pointToDisplay(state.pointB, team==="B", gm);
  state.gameHistory.push({setIdx:setIdxAtWin, a:da, b:db, winner:team});

  const cur=state.sets[state.currentSet];
  if(team==="A")cur.a++;else cur.b++;
  const snap={a:cur.a,b:cur.b};
  state.pointA=0;state.pointB=0;
  const setDone=isSetFinished(cur);let matchNow=false;
  if(setDone){
    const wA=setsWon("A"),wB=setsWon("B");
    const needed=state.setsToWin||2;
    if(wA>=needed){state.matchFinished=true;state.winner="A";matchNow=true;}
    else if(wB>=needed){state.matchFinished=true;state.winner="B";matchNow=true;}
    else if(state.currentSet<4)state.currentSet++;
  }
  if(!matchNow){
    if(state.tieBreak && state.tbInitialServer){
      // New set: the team that did NOT start TB serves first
      state.server = state.tbInitialServer === "A" ? "B" : "A";
    } else {
      state.server = state.server === "A" ? "B" : "A";
    }
    state.servePos = "right";
    state.tieBreak = false; // reset TB flag for new set
    state.tbInitialServer = "A"; // reset
    // Announce tie-break game if now at 6-6
    const cur2=state.sets[state.currentSet];
    if(state.tieBreak && cur2.a===6 && cur2.b===6){
      const tbMsg=lang()==="FR"?"Jeu décisif !":"Tie break!";
      speakSequence([tbMsg]);
      return;
    }
  }
  announceGame(team,snap,setDone,matchNow);
}

// TB serve rule (official padel/tennis):
// n = total points played so far (0 = before first serve)
// n=0:   initial server, RIGHT
// n=1,2: other server,   LEFT then RIGHT
// n=3,4: initial server, LEFT then RIGHT
// n=5,6: other server,   LEFT then RIGHT  ...
// Position always: even n = RIGHT, odd n = LEFT
function tbServeState(n, initialServer){
  const other = initialServer==="A" ? "B" : "A";
  let server;
  if(n === 0){
    server = initialServer;                             // 1st point: initial
  } else {
    // After 1st point: blocks of 2. Block 0 = other, block 1 = initial, block 2 = other...
    const blockIndex = Math.floor((n - 1) / 2);
    server = blockIndex % 2 === 0 ? other : initialServer;
  }
  // Position: RIGHT on even total points, LEFT on odd
  const servePos = n % 2 === 0 ? "right" : "left";
  return {server, servePos};
}

function isTBGame(){
  const cur=state.sets[state.currentSet];
  return state.tieBreak && cur.a===6 && cur.b===6;
}

function incrementA(){if(state.matchFinished)return;saveHistory();state.matchStarted=true;state.totalPointsA++;const before=JSON.stringify(state.sets);const gm=state.gameMode||"golden";if(isTBGame()){
  // Set initial server on very first TB point
  if(state.pointA===0&&state.pointB===0) state.tbInitialServer=state.server;
  const a=state.pointA+1,b=state.pointB;
  if(a>=7&&(a-b)>=2){winGame("A");}else{state.pointA++;}
}else if(gm==="golden"){if(state.pointA<=2)state.pointA++;else winGame("A");}else{const a=state.pointA,b=state.pointB;if(a<3)state.pointA++;else if(a===3&&b<3)winGame("A");else if(a===3&&b===3)state.pointA=4;else if(a===4&&b===3)winGame("A");else if(a===3&&b===4){state.pointA=3;state.pointB=3;}}
vibrate(25);
if(JSON.stringify(state.sets)===before&&!state.matchFinished){
  if(isTBGame()){
    const ss=tbServeState(state.pointA+state.pointB, state.tbInitialServer);
    state.server=ss.server; state.servePos=ss.servePos;
  } else {
    state.servePos=state.servePos==="left"?"right":"left";
  }
  if(!checkSpecialPoint())speak(currentGameScoreStr());
}render();}
function incrementB(){if(state.matchFinished)return;saveHistory();state.matchStarted=true;state.totalPointsB++;const before=JSON.stringify(state.sets);const gm=state.gameMode||"golden";if(isTBGame()){
  if(state.pointA===0&&state.pointB===0) state.tbInitialServer=state.server;
  const a=state.pointA,b=state.pointB+1;
  if(b>=7&&(b-a)>=2){winGame("B");}else{state.pointB++;}
}else if(gm==="golden"){if(state.pointB<=2)state.pointB++;else winGame("B");}else{const a=state.pointA,b=state.pointB;if(b<3)state.pointB++;else if(b===3&&a<3)winGame("B");else if(b===3&&a===3)state.pointB=4;else if(b===4&&a===3)winGame("B");else if(b===3&&a===4){state.pointA=3;state.pointB=3;}}
vibrate(25);
if(JSON.stringify(state.sets)===before&&!state.matchFinished){
  if(isTBGame()){
    const ss=tbServeState(state.pointA+state.pointB, state.tbInitialServer);
    state.server=ss.server; state.servePos=ss.servePos;
  } else {
    state.servePos=state.servePos==="left"?"right":"left";
  }
  if(!checkSpecialPoint())speak(currentGameScoreStr());
}render();}


function cycleGameMode(){
  state.gameMode = state.gameMode==="golden" ? "normal" : "golden";
  state.pointA=0; state.pointB=0;
  state.servePos=state.server==="A"?"left":"right";
  vibrate(35); render();
  speak(state.gameMode==="golden" ? t().golden : t().normal);
}

function toggleTieBreak(){
  const cur=state.sets[state.currentSet];
  if(!(cur.a===6 && cur.b===6 && state.pointA===0 && state.pointB===0)) return;
  state.tieBreak = !state.tieBreak;
  vibrate(35); render();
  const msg = state.tieBreak
    ? (lang()==="FR" ? "Jeu décisif activé" : "Tie break on")
    : (lang()==="FR" ? "Jeu décisif désactivé" : "Tie break off");
  speak(msg);
}

function canChangeSets(){
  if(state.matchFinished) return false;
  const wA=setsWon("A"), wB=setsWon("B");
  // Block if a team already has enough sets to win with current setting
  if(wA>=state.setsToWin||wB>=state.setsToWin) return false;
  // Block if switching would make the match already decided
  // e.g. switching from S3→S2 when one team already has 2 sets
  const newNeeded = state.setsToWin===2 ? 3 : 2;
  if(wA>=newNeeded||wB>=newNeeded) return false;
  return true;
}

function toggleSets(){
  if(!canChangeSets()) return;
  state.setsToWin = state.setsToWin===2 ? 3 : 2;
  vibrate(35); render();
  const msg = state.setsToWin===2
    ? (lang()==="FR" ? "Victoire en 2 sets" : "Winner in 2 sets")
    : (lang()==="FR" ? "Victoire en 3 sets" : "Winner in 3 sets");
  speak(msg);
}

function cycleAudioMode(){
  const idx = AUDIO_MODES.indexOf(state.audioMode);
  state.audioMode = AUDIO_MODES[(idx+1) % AUDIO_MODES.length];
  vibrate(35);
  render();
  // Announce new mode if not muted
  if(!isMuted()) speak(t().audioOn);
}

function toggleServer(){if(state.matchStarted)return;state.server=state.server==="A"?"B":"A";state.servePos="right";vibrate(35);render();speak(t().srvTeam(state.server));}
function doReset(){saveHistory();state.pointA=0;state.pointB=0;state.sets=Array(5).fill(null).map(()=>({a:0,b:0}));state.currentSet=0;state.matchFinished=false;state.winner=null;state.server="A";state.servePos="right";state.matchStarted=false;state.gameHistory=[];state.totalPointsA=0;state.totalPointsB=0;vibrate([40,40,40]);render();speak(t().reset);}
function doUndo(){
  if(!history.length)return;
  const pAM=state.audioMode,pGM=state.gameMode,pST=state.setsToWin,pTBInit=state.tbInitialServer;
  // Do NOT preserve tieBreak from current state — restore it from history
  const prev=history.pop();
  Object.keys(state).forEach(k=>delete state[k]);
  Object.assign(state,prev);
  state.audioMode=pAM;
  state.gameMode=pGM;
  state.setsToWin=pST;
  state.tbInitialServer=pTBInit;
  // tieBreak is restored from history snapshot (correct value for that moment)
  vibrate([30,30]);render();speak(t().undo);
}

// ── Server ball ───────────────────────────────────────────────────────────────
function updateServerBall(){
  const b=document.getElementById("serverBall");
  if(!b)return;
  if(state.matchFinished){b.style.display="none";return;}
  b.style.display="block";
  const aR=els.scoreA.getBoundingClientRect();
  const bR=els.scoreB.getBoundingClientRect();
  const ar=document.getElementById("app").getBoundingClientRect();
  const sz=22,off=4;
  let left,top;
  if(state.server==="A"){
    top=(aR.top-ar.top)-sz/2+off;
    // Team A faces opposite direction → flip left/right
    const flipped = state.servePos==="left" ? "right" : "left";
    left=flipped==="left"?(aR.left-ar.left)-sz/2+off:(aR.right-ar.left)-sz/2-off;
  }else{
    top=(bR.top-ar.top)-sz/2+off;
    left=state.servePos==="right"?(bR.right-ar.left)-sz/2-off:(bR.left-ar.left)-sz/2+off;
  }
  b.style.left=left+"px";
  b.style.top=top+"px";
}

// ── Render ────────────────────────────────────────────────────────────────────
function audioBtnLabel(){
  if(state.audioMode==="EN") return "🔊EN";
  if(state.audioMode==="FR") return "🔊FR";
  return "🔇";
}

function render(){
  els.scoreA.textContent=getDisplayScore("A");
  els.scoreB.textContent=getDisplayScore("B");

  const vi=[0,1,2].map(i=>{const s=state.currentSet<=2?0:state.currentSet===3?1:2;return s+i;});
  [els.setH1,els.setH2,els.setH3].forEach((el,i)=>{if(el)el.textContent=(vi[i]+1);});
  [[els.setA1,els.setA2,els.setA3],[els.setB1,els.setB2,els.setB3]].forEach((cells,row)=>{
    cells.forEach((el,i)=>{
      if(!el)return;
      el.textContent=row===0?state.sets[vi[i]].a:state.sets[vi[i]].b;
      el.className="setsCell"+(vi[i]===state.currentSet?" active-score":" inactive-score");
    });
  });

  els.setLabel.textContent="SET "+(Math.min(state.currentSet+1,5));
  const gmLabels={"golden":"G","normal":"N","tb":"TB","stb":"STB"};
  const gm=state.gameMode||"golden";
  els.modeBtn.textContent=gmLabels[gm];
  els.modeBtn.classList.toggle("strikethrough", false);
  els.modeBtn.classList.toggle("tb-active", gm==="tb");
  els.modeBtn.classList.toggle("stb-active", gm==="stb");
  if(els.modeLabel){const mlLabels={"golden":"G - Golden","normal":"G - Normal","tb":"Tie Break","stb":"Super TB"};els.modeLabel.textContent=mlLabels[gm];}
  if(els.setsBtn){
    const setLabel=state.setsToWin===2?"S2":"S3";
    els.setsBtn.textContent=setLabel;
    els.setsBtn.classList.toggle("bo5",state.setsToWin===3);
    const setsChangeable=canChangeSets();
    els.setsBtn.style.opacity=setsChangeable?"1":"0.35";
    els.setsBtn.style.pointerEvents=setsChangeable?"auto":"none";
  }
  if(els.tbreakBtn){
    const cur=state.sets[state.currentSet];
    // Active ONLY when set score is exactly 6-6 AND no points played yet
    const atSixSix = cur.a===6 && cur.b===6 && state.pointA===0 && state.pointB===0;
    els.tbreakBtn.textContent = state.tieBreak ? "TB ✓" : "TB";
    els.tbreakBtn.classList.toggle("tb-on", state.tieBreak && atSixSix);
    els.tbreakBtn.style.opacity = atSixSix ? "1" : "0.25";
    els.tbreakBtn.style.pointerEvents = atSixSix ? "auto" : "none";
  }
  els.audioBtn.textContent=audioBtnLabel();
  els.audioBtn.style.opacity=state.audioMode==="MUTE"?"0.45":"1";
  if(els.serverBtn){
    els.serverBtn.textContent="Srv "+state.server;
    els.serverBtn.classList.toggle("disabled-btn",state.matchStarted);
  }

  const dis=state.matchFinished;
  els.scoreA.classList.toggle("disabled",dis);
  els.scoreB.classList.toggle("disabled",dis);
  // Grey all interactive buttons when locked



  // Build history overlay
  if(state.matchFinished&&state.winner){
    // Stats
    if(els.overlayStats){
      const fr=lang()==="FR";
      els.overlayStats.innerHTML=`
        <span class="stat-num-a">A&nbsp;${state.totalPointsA}</span>
        <span class="stat-label">${fr?"Points<br>totaux":"Total<br>points"}</span>
        <span class="stat-num-b">${state.totalPointsB}&nbsp;B</span>`;
    }
    els.overlayWinner.textContent="🏆 Team "+state.winner+" wins!";
    els.overlayScore.textContent=state.sets.filter((_,i)=>i<=state.currentSet).map(s=>s.a+"-"+s.b).join("  ");
    els.matchOverlay.classList.add("show");
  } else {
    if(els.overlayStats) els.overlayStats.innerHTML="";
    els.matchOverlay.classList.remove("show");
  }
  requestAnimationFrame(updateServerBall);
}

// ── Events ────────────────────────────────────────────────────────────────────
bindTap(els.scoreA,incrementA);bindTap(els.scoreB,incrementB);
bindTap(els.modeBtn,cycleGameMode);
bindTap(els.tbreakBtn,toggleTieBreak);bindTap(els.setsBtn,toggleSets);
bindTap(els.audioBtn,cycleAudioMode);
bindTap(els.serverBtn,toggleServer);bindTap(els.undoBtn,doUndo);
bindTap(els.resetOverlayBtn,doReset);
bindTap(els.undoOverlayBtn,()=>{ doUndo(); });

els.resetBtn.addEventListener("touchstart",e=>{e.preventDefault();els.resetBtn.classList.add("holding");resetTimer=setTimeout(doReset,800);},{passive:false});
els.resetBtn.addEventListener("touchend",()=>{clearTimeout(resetTimer);els.resetBtn.classList.remove("holding");});
els.resetBtn.addEventListener("touchcancel",()=>{clearTimeout(resetTimer);els.resetBtn.classList.remove("holding");});
els.resetBtn.addEventListener("mousedown",()=>{els.resetBtn.classList.add("holding");resetTimer=setTimeout(doReset,800);});
els.resetBtn.addEventListener("mouseup",()=>{clearTimeout(resetTimer);els.resetBtn.classList.remove("holding");});
els.resetBtn.addEventListener("mouseleave",()=>{clearTimeout(resetTimer);els.resetBtn.classList.remove("holding");});

if(window.speechSynthesis&&window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=()=>{};
render();
})();
</script>
