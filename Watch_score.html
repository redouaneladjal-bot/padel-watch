<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PadelTap</title>

<style>

body{
margin:0;
background:#123cbe;
font-family:Arial;
color:white;
overflow:hidden;
}

#app{
width:100vw;
height:100vh;
position:relative;
}

/* MODE */

.mode{
position:absolute;
top:4%;
left:40%;
width:60px;
height:30px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.2);
border:2px solid rgba(255,255,255,0.4);
font-weight:bold;
}

.modeLabel{
position:absolute;
top:10%;
left:37%;
font-size:11px;
}

/* LOCK */

.lock{
position:absolute;
top:4%;
left:65%;
width:48px;
height:48px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#66d2ff;
border:2px solid #2c7aa8;
font-weight:bold;
}

/* SET TABLE */

.setLabel{
position:absolute;
left:8%;
top:18%;
font-weight:bold;
}

.sets{
position:absolute;
left:8%;
top:26%;
width:35%;
}

.row{
display:grid;
grid-template-columns:repeat(3,1fr);
}

.cell{
height:38px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.row:not(:last-child) .cell{
border-bottom:1px solid rgba(255,255,255,0.5);
}

.row .cell:not(:last-child){
border-right:1px solid rgba(255,255,255,0.5);
}

/* SCORE BUTTONS */

.score{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
color:#123047;
}

.scoreA{
top:22%;
left:58%;
background:#f2c300;
box-shadow:0 0 0 5px white;
}

.scoreB{
top:56%;
left:58%;
background:#e9deef;
}

/* BOTTOM BUTTONS */

.reset{
position:absolute;
left:12%;
top:72%;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#66d2ff;
border:2px solid #2c7aa8;
font-size:22px;
font-weight:bold;
}

.undo{
position:absolute;
left:30%;
top:72%;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#66d2ff;
border:2px solid #2c7aa8;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="app">

<div class="mode">G</div>
<div class="modeLabel">G - Golden</div>
<div class="lock">L</div>

<div class="setLabel">SET 1</div>

<div class="sets">

<div class="row">
<div class="cell">1</div>
<div class="cell">2</div>
<div class="cell">3</div>
</div>

<div class="row">
<div class="cell">0</div>
<div class="cell">0</div>
<div class="cell">0</div>
</div>

<div class="row">
<div class="cell">0</div>
<div class="cell">0</div>
<div class="cell">0</div>
</div>

</div>

<div class="score scoreA" id="scoreA">0</div>
<div class="score scoreB" id="scoreB">0</div>

<div class="reset" id="resetBtn">R</div>
<div class="undo" id="undoBtn">U</div>

</div>

<script>

let scoreA=0
let scoreB=0

function vibrate(){
if(navigator.vibrate) navigator.vibrate(30)
}

function nextScore(v){
if(v==0) return 15
if(v==15) return 30
if(v==30) return 40
return 0
}

document.getElementById("scoreA").onclick=function(){
scoreA=nextScore(scoreA)
this.innerText=scoreA
vibrate()
}

document.getElementById("scoreB").onclick=function(){
scoreB=nextScore(scoreB)
this.innerText=scoreB
vibrate()
}

/* LONG PRESS RESET */

let resetTimer

document.getElementById("resetBtn").addEventListener("touchstart",function(){

resetTimer=setTimeout(function(){

scoreA=0
scoreB=0

document.getElementById("scoreA").innerText=0
document.getElementById("scoreB").innerText=0

vibrate()

},800)

})

document.getElementById("resetBtn").addEventListener("touchend",function(){
clearTimeout(resetTimer)
})

/* LONG PRESS UNDO */

let undoTimer

document.getElementById("undoBtn").addEventListener("touchstart",function(){

undoTimer=setTimeout(function(){

scoreA=0
scoreB=0

document.getElementById("scoreA").innerText=0
document.getElementById("scoreB").innerText=0

vibrate()

},600)

})

document.getElementById("undoBtn").addEventListener("touchend",function(){
clearTimeout(undoTimer)
})

</script>

</body>
</html>
