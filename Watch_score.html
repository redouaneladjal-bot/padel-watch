<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PadelTap Watch Layout V5</title>
<style>
:root{
  --bg:#123cbe;
  --shell:#232323;
  --yellow:#f2c300;
  --grey:#e8dff0;
  --blue:#66d2ff;
  --blueBorder:#2c7aa8;
  --grid:rgba(234,244,255,0.55);
  --text:#f3f8ff;
  --textDark:#123047;
  --lock:#9b2b2b;
  --lockBorder:#6f1717;
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}
html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  background:#d7d7d7;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
}
.shell{
  width:450px;
  height:450px;
  border-radius:50%;
  background:var(--shell);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  box-shadow:0 12px 30px rgba(0,0,0,.24);
}
.watch{
  width:100%;
  height:100%;
  border-radius:50%;
  background:var(--bg);
  position:relative;
  overflow:hidden;
  border:3px solid #081320;
}

/* Everything is kept inside a safe circle area */
.safe{
  position:absolute;
  inset:22px;
  border-radius:50%;
}

.mode{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  width:54px;
  height:26px;
  border-radius:13px;
  border:2px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.10);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
  font-weight:bold;
  font-size:13px;
}

.setLabel{
  position:absolute;
  top:38px;
  left:16px;
  color:var(--text);
  font-size:12px;
  font-weight:bold;
  letter-spacing:.7px;
}

.lockBadge{
  position:absolute;
  top:38px;
  right:18px;
  color:#ffccd0;
  font-size:11px;
  font-weight:bold;
  opacity:0;
}
.lockBadge.visible{opacity:1;}

.sets{
  position:absolute;
  left:18px;
  top:82px;
  width:138px;
  color:var(--text);
}
.row{
  display:grid;
  grid-template-columns:repeat(3,46px);
}
.cell{
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
.head{
  font-size:15px;
  font-weight:bold;
}
.row:not(:last-child) .cell{border-bottom:1px solid var(--grid);}
.row .cell:not(:last-child){border-right:1px solid var(--grid);}

.reset{
  position:absolute;
  left:38px;
  top:210px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--blue);
  border:2px solid var(--blueBorder);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  font-weight:bold;
}
.reset.holding{
  background:var(--lock);
  border-color:var(--lockBorder);
}

.scores{
  position:absolute;
  right:20px;
  top:82px;
  display:flex;
  flex-direction:column;
  gap:18px;
  align-items:center;
}
.score{
  width:118px;
  height:118px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:bold;
  color:var(--textDark);
  position:relative;
  border:2px solid rgba(255,255,255,.18);
  box-shadow:inset 0 2px 0 rgba(255,255,255,.18);
}
.scoreA{background:var(--yellow);}
.scoreB{background:var(--grey);}
.owner::before{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.96);
  pointer-events:none;
}
.score.disabled{
  opacity:.78;
  filter:grayscale(.1);
}
.score.disabled::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:rgba(10,23,41,.22);
}

.undo{
  position:absolute;
  left:138px;
  bottom:28px;
  width:54px;
  height:54px;
  border-radius:50%;
  background:var(--blue);
  border:2px solid var(--blueBorder);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  font-weight:bold;
}

.lock{
  position:absolute;
  right:22px;
  top:194px;
  width:54px;
  height:54px;
  border-radius:50%;
  background:var(--blue);
  border:2px solid var(--blueBorder);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  font-weight:bold;
}
.lock.locked{
  background:var(--lock);
  border-color:var(--lockBorder);
}

.hint{
  position:absolute;
  bottom:12px;
  right:14px;
  color:rgba(234,244,255,.75);
  font-size:10px;
  white-space:nowrap;
}
</style>
</head>
<body>
<div class="shell">
  <div class="watch">
    <div class="safe">
      <div class="mode" id="modeBtn">G</div>
      <div class="setLabel" id="setLabel">SET 1</div>
      <div class="lockBadge" id="lockBadge">LOCKED</div>

      <div class="sets">
        <div class="row">
          <div class="cell head">1</div>
          <div class="cell head">2</div>
          <div class="cell head">3</div>
        </div>
        <div class="row">
          <div class="cell" id="setA1">0</div>
          <div class="cell" id="setA2">0</div>
          <div class="cell" id="setA3">0</div>
        </div>
        <div class="row">
          <div class="cell" id="setB1">0</div>
          <div class="cell" id="setB2">0</div>
          <div class="cell" id="setB3">0</div>
        </div>
      </div>

      <div class="reset" id="resetBtn">R</div>

      <div class="scores">
        <div class="score scoreA owner" id="scoreA">0</div>
        <div class="score scoreB" id="scoreB">0</div>
      </div>

      <div class="undo" id="undoBtn">U</div>
      <div class="lock" id="lockBtn">L</div>
      <div class="hint">G = golden / N = normal</div>
    </div>
  </div>
</div>

<script>
let state = {
  pointA: 0,
  pointB: 0,
  sets: [{a:0,b:0},{a:0,b:0},{a:0,b:0}],
  currentSet: 0,
  locked: false,
  mode: "golden"
};

const history = [];
let resetPressTimer = null;

const scoreA = document.getElementById("scoreA");
const scoreB = document.getElementById("scoreB");
const resetBtn = document.getElementById("resetBtn");
const undoBtn = document.getElementById("undoBtn");
const lockBtn = document.getElementById("lockBtn");
const modeBtn = document.getElementById("modeBtn");
const setLabel = document.getElementById("setLabel");
const lockBadge = document.getElementById("lockBadge");

const setEls = {
  a1: document.getElementById("setA1"),
  a2: document.getElementById("setA2"),
  a3: document.getElementById("setA3"),
  b1: document.getElementById("setB1"),
  b2: document.getElementById("setB2"),
  b3: document.getElementById("setB3")
};

function bindTap(el, fn){
  let touched = false;
  el.addEventListener("touchstart", e => {
    touched = true;
    e.preventDefault();
    fn();
  }, {passive:false});
  el.addEventListener("click", e => {
    if (touched){ touched = false; return; }
    e.preventDefault();
    fn();
  });
}

function cloneState(s){ return JSON.parse(JSON.stringify(s)); }

function saveHistory(){
  history.push(cloneState(state));
  if(history.length > 100) history.shift();
}

function isDeuceState(){
  return state.pointA >= 3 && state.pointB >= 3;
}

function currentSetFinished(setObj){
  const a = setObj.a, b = setObj.b;
  return (a >= 6 || b >= 6) && Math.abs(a - b) >= 2;
}

function advanceSetIfNeeded(){
  const setObj = state.sets[state.currentSet];
  if(currentSetFinished(setObj) && state.currentSet < 2){
    state.currentSet += 1;
  }
}

function winGame(team){
  const setObj = state.sets[state.currentSet];
  if(team === "A") setObj.a += 1;
  else setObj.b += 1;
  state.pointA = 0;
  state.pointB = 0;
  advanceSetIfNeeded();
}

function incrementAGolden(){
  if(state.pointA <= 2){ state.pointA += 1; return; }
  if(state.pointA === 3 && state.pointB < 3){ winGame("A"); return; }
  if(state.pointA === 3 && state.pointB === 3){ winGame("A"); }
}

function incrementBGolden(){
  if(state.pointB <= 2){ state.pointB += 1; return; }
  if(state.pointB === 3 && state.pointA < 3){ winGame("B"); return; }
  if(state.pointA === 3 && state.pointB === 3){ winGame("B"); }
}

function incrementANormal(){
  if(!isDeuceState()){
    if(state.pointA <= 2){ state.pointA += 1; return; }
    if(state.pointA === 3 && state.pointB < 3){ winGame("A"); return; }
    if(state.pointA === 3 && state.pointB === 3){ state.pointA = 4; return; }
  } else {
    if(state.pointA === state.pointB) state.pointA += 1;
    else if(state.pointA > state.pointB) winGame("A");
    else { state.pointA = 3; state.pointB = 3; }
  }
}

function incrementBNormal(){
  if(!isDeuceState()){
    if(state.pointB <= 2){ state.pointB += 1; return; }
    if(state.pointB === 3 && state.pointA < 3){ winGame("B"); return; }
    if(state.pointA === 3 && state.pointB === 3){ state.pointB = 4; return; }
  } else {
    if(state.pointA === state.pointB) state.pointB += 1;
    else if(state.pointB > state.pointA) winGame("B");
    else { state.pointA = 3; state.pointB = 3; }
  }
}

function incrementA(){
  if(state.locked) return;
  saveHistory();
  if(state.mode === "golden") incrementAGolden();
  else incrementANormal();
  render();
}

function incrementB(){
  if(state.locked) return;
  saveHistory();
  if(state.mode === "golden") incrementBGolden();
  else incrementBNormal();
  render();
}

function getDisplayScore(team){
  const a = state.pointA, b = state.pointB;
  if(state.mode === "golden"){
    const labels = ["0","15","30","40"];
    return team === "A" ? labels[Math.min(a,3)] : labels[Math.min(b,3)];
  }
  if(a >= 3 && b >= 3){
    if(a === b) return "D";
    if(team === "A") return a > b ? "A" : "40";
    return b > a ? "A" : "40";
  }
  const labels = ["0","15","30","40","A"];
  return team === "A" ? labels[a] : labels[b];
}

function resetAll(){
  saveHistory();
  state = {
    pointA: 0,
    pointB: 0,
    sets: [{a:0,b:0},{a:0,b:0},{a:0,b:0}],
    currentSet: 0,
    locked: false,
    mode: state.mode
  };
  render();
}

function undo(){
  if(history.length === 0) return;
  state = history.pop();
  render();
}

function toggleLock(){
  state.locked = !state.locked;
  render();
}

function toggleMode(){
  saveHistory();
  state.mode = state.mode === "golden" ? "normal" : "golden";
  state.pointA = 0;
  state.pointB = 0;
  render();
}

function startResetHold(){
  resetBtn.classList.add("holding");
  resetPressTimer = setTimeout(() => {
    resetBtn.classList.remove("holding");
    resetAll();
  }, 900);
}

function cancelResetHold(){
  clearTimeout(resetPressTimer);
  resetBtn.classList.remove("holding");
}

function render(){
  scoreA.textContent = getDisplayScore("A");
  scoreB.textContent = getDisplayScore("B");

  setEls.a1.textContent = state.sets[0].a;
  setEls.a2.textContent = state.sets[1].a;
  setEls.a3.textContent = state.sets[2].a;
  setEls.b1.textContent = state.sets[0].b;
  setEls.b2.textContent = state.sets[1].b;
  setEls.b3.textContent = state.sets[2].b;

  setLabel.textContent = `SET ${Math.min(state.currentSet + 1, 3)}`;
  modeBtn.textContent = state.mode === "golden" ? "G" : "N";

  if(state.locked){
    lockBtn.classList.add("locked");
    lockBadge.classList.add("visible");
    scoreA.classList.add("disabled");
    scoreB.classList.add("disabled");
  } else {
    lockBtn.classList.remove("locked");
    lockBadge.classList.remove("visible");
    scoreA.classList.remove("disabled");
    scoreB.classList.remove("disabled");
  }
}

bindTap(scoreA, incrementA);
bindTap(scoreB, incrementB);
bindTap(undoBtn, undo);
bindTap(lockBtn, toggleLock);
bindTap(modeBtn, toggleMode);

resetBtn.addEventListener("mousedown", startResetHold);
resetBtn.addEventListener("mouseup", cancelResetHold);
resetBtn.addEventListener("mouseleave", cancelResetHold);
resetBtn.addEventListener("touchstart", function(e){
  e.preventDefault();
  startResetHold();
}, {passive:false});
resetBtn.addEventListener("touchend", function(e){
  e.preventDefault();
  cancelResetHold();
}, {passive:false});
resetBtn.addEventListener("touchcancel", cancelResetHold);

render();
</script>
</body>
</html>
