<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>PadelTap V17</title>
<style>
  :root{
    --bg:#123cbe;
    --yellow:#f2c300;
    --grey:#e9deef;
    --blue:#66d2ff;
    --blueBorder:#2c7aa8;
    --text:#f3f8ff;
    --textDark:#123047;
    --grid:rgba(255,255,255,0.45);
    --lock:#9b2b2b;
    --lockBorder:#6f1717;
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:Arial,Helvetica,sans-serif;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    user-select:none;
  }

  #app{
    position:relative;
    width:100vw;
    height:100vh;
    background:var(--bg);
    overflow:hidden;
  }

  .mode{
    position:absolute;
    top:4%;
    left:28%;
    width:60px;
    height:30px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:white;
    background:rgba(255,255,255,.18);
    border:2px solid rgba(255,255,255,.28);
    font-size:14px;
  }

  .modeLabel{
    position:absolute;
    top:13%;
    left:27%;
    font-size:11px;
    color:white;
    font-weight:bold;
  }

  .lock{
    position:absolute;
    top:4%;
    left:48%;
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    color:white;
    font-weight:bold;
    font-size:18px;
  }

  .lock.locked{
    background:var(--lock);
    border-color:var(--lockBorder);
  }

  .audioBtn{
    position:absolute;
    top:4%;
    left:64%;
    width:86px;
    height:30px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:white;
    background:rgba(255,255,255,.18);
    border:2px solid rgba(255,255,255,.28);
    font-size:12px;
  }

  .serverBtn{
    position:absolute;
    top:12%;
    left:64%;
    width:86px;
    height:30px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:white;
    background:rgba(255,255,255,.18);
    border:2px solid rgba(255,255,255,.28);
    font-size:12px;
  }

  .setLabel{
    position:absolute;
    left:12%;
    top:18%;
    font-weight:bold;
    color:white;
    font-size:13px;
  }

  .sets{
    position:absolute;
    left:11%;
    top:26%;
    width:35%;
    color:white;
  }

  .row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
  }

  .cell{
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
  }

  .head{
    font-size:15px;
    font-weight:bold;
  }

  .row:not(:last-child) .cell{
    border-bottom:1px solid var(--grid);
  }

  .row .cell:not(:last-child){
    border-right:1px solid var(--grid);
  }

  .score{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    color:var(--textDark);
  }

  .scoreA{
    top:20%;
    left:58%;
    background:var(--yellow);
    box-shadow:0 0 0 5px white;
  }

  .scoreB{
    top:54%;
    left:58%;
    background:var(--grey);
  }

  .disabled{
    opacity:.72;
    filter:grayscale(0.08);
  }

  .reset{
    position:absolute;
    left:13%;
    top:66%;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    color:white;
    font-size:22px;
    font-weight:bold;
  }

  .undo{
    position:absolute;
    left:44%;
    top:80%;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    color:white;
    font-size:22px;
    font-weight:bold;
    transform:translateX(-50%);
  }

  .holding{
    background:var(--lock) !important;
    border-color:var(--lockBorder) !important;
  }
</style>
</head>
<body>

<div id="app">
  <div class="mode" id="modeBtn">G</div>
  <div class="modeLabel" id="modeLabel">G - Golden</div>
  <div class="lock" id="lockBtn">L</div>

  <div class="audioBtn" id="audioBtn">Audio ON</div>
  <div class="serverBtn" id="serverBtn">Srv A</div>

  <div class="setLabel" id="setLabel">SET 1</div>

  <div class="sets">
    <div class="row">
      <div class="cell head">1</div>
      <div class="cell head">2</div>
      <div class="cell head">3</div>
    </div>
    <div class="row">
      <div class="cell" id="setA1">0</div>
      <div class="cell" id="setA2">0</div>
      <div class="cell" id="setA3">0</div>
    </div>
    <div class="row">
      <div class="cell" id="setB1">0</div>
      <div class="cell" id="setB2">0</div>
      <div class="cell" id="setB3">0</div>
    </div>
  </div>

  <div class="score scoreA" id="scoreA">0</div>
  <div class="score scoreB" id="scoreB">0</div>

  <div class="reset" id="resetBtn">R</div>
  <div class="undo" id="undoBtn">U</div>
</div>

<script>
  let state = {
    pointA: 0,
    pointB: 0,
    sets: [
      { a: 0, b: 0 },
      { a: 0, b: 0 },
      { a: 0, b: 0 }
    ],
    currentSet: 0,
    locked: false,
    mode: "golden",
    matchFinished: false,
    audioEnabled: true,
    server: "A"
  };

  const history = [];
  let resetTimer = null;
  let undoTimer = null;

  const scoreAEl = document.getElementById("scoreA");
  const scoreBEl = document.getElementById("scoreB");
  const modeBtn = document.getElementById("modeBtn");
  const modeLabel = document.getElementById("modeLabel");
  const lockBtn = document.getElementById("lockBtn");
  const resetBtn = document.getElementById("resetBtn");
  const undoBtn = document.getElementById("undoBtn");
  const setLabel = document.getElementById("setLabel");
  const audioBtn = document.getElementById("audioBtn");
  const serverBtn = document.getElementById("serverBtn");

  const setEls = {
    a1: document.getElementById("setA1"),
    a2: document.getElementById("setA2"),
    a3: document.getElementById("setA3"),
    b1: document.getElementById("setB1"),
    b2: document.getElementById("setB2"),
    b3: document.getElementById("setB3")
  };

  function vibrate(ms){
    try {
      if (navigator.vibrate) navigator.vibrate(ms || 30);
    } catch (e) {}
  }

  function speak(text){
    if (!state.audioEnabled) return;
    try{
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      utter.rate = 1.0;
      utter.pitch = 1.0;
      speechSynthesis.speak(utter);
    } catch(e){}
  }

  function cloneState(obj){
    return JSON.parse(JSON.stringify(obj));
  }

  function saveHistory(){
    history.push(cloneState(state));
    if (history.length > 100) history.shift();
  }

  function bindTap(el, handler){
    let touched = false;

    el.addEventListener("touchstart", function(e){
      touched = true;
      e.preventDefault();
      handler();
    }, { passive:false });

    el.addEventListener("click", function(e){
      if (touched){
        touched = false;
        return;
      }
      e.preventDefault();
      handler();
    });
  }

  function isDeuceState(){
    return state.pointA >= 3 && state.pointB >= 3;
  }

  function currentSetFinished(setObj){
    const a = setObj.a;
    const b = setObj.b;
    return (a >= 6 || b >= 6) && Math.abs(a - b) >= 2;
  }

  function advanceSetIfNeeded(){
    const current = state.sets[state.currentSet];

    if (!currentSetFinished(current)) return;

    if (state.currentSet < 2){
      state.currentSet += 1;
    } else {
      state.matchFinished = true;
    }
  }

  function pointDisplayValue(v){
    const labels = ["0","15","30","40"];
    return labels[Math.min(v,3)];
  }

  function currentGames(){
    return {
      a: state.sets[state.currentSet].a,
      b: state.sets[state.currentSet].b
    };
  }

  function announcePoint(){
    if (state.matchFinished) return;

    if (state.mode === "normal" && state.pointA >= 3 && state.pointB >= 3){
      if (state.pointA === state.pointB){
        speak("Deuce");
        return;
      }

      const advTeam = state.pointA > state.pointB ? "A" : "B";
      if (advTeam === state.server){
        speak("Advantage server");
      } else {
        speak("Advantage receiver");
      }
      return;
    }

    const aText = pointDisplayValue(state.pointA);
    const bText = pointDisplayValue(state.pointB);

    let first, second;
    if (state.server === "A"){
      first = aText;
      second = bText;
    } else {
      first = bText;
      second = aText;
    }

    speak(first + " " + second);
  }

  function announceGameWinner(team){
    const games = currentGames();

    const set1 = state.sets[0];
    const set2 = state.sets[1];
    const set3 = state.sets[2];

    const text =
      "Game " + team + ". " +
      "Sets " +
      set1.a + " " + set2.a + " " + set3.a +
      " against " +
      set1.b + " " + set2.b + " " + set3.b + ". " +
      "Games " + games.a + " " + games.b + ".";

    speak(text);
  }

  function announceMatchFinished(){
    const set1 = state.sets[0];
    const set2 = state.sets[1];
    const set3 = state.sets[2];

    let wonA = 0;
    let wonB = 0;

    [set1, set2, set3].forEach(s => {
      if (currentSetFinished(s)) {
        if (s.a > s.b) wonA++;
        else if (s.b > s.a) wonB++;
      }
    });

    const winner = wonA > wonB ? "A" : "B";

    speak(
      "Match finished. Winner team " + winner + ". " +
      "Final sets " +
      set1.a + " " + set2.a + " " + set3.a +
      " against " +
      set1.b + " " + set2.b + " " + set3.b + "."
    );
  }

  function winGame(team){
    if (state.matchFinished) return;

    const current = state.sets[state.currentSet];

    if (team === "A") current.a += 1;
    else current.b += 1;

    state.pointA = 0;
    state.pointB = 0;

    announceGameWinner(team);

    const previousSet = state.currentSet;
    advanceSetIfNeeded();

    if (state.matchFinished){
      announceMatchFinished();
      return;
    }

    state.server = state.server === "A" ? "B" : "A";
  }

  function incrementAGolden(){
    if (state.pointA <= 2){
      state.pointA += 1;
      return;
    }
    if (state.pointA === 3 && state.pointB < 3){
      winGame("A");
      return;
    }
    if (state.pointA === 3 && state.pointB === 3){
      winGame("A");
    }
  }

  function incrementBGolden(){
    if (state.pointB <= 2){
      state.pointB += 1;
      return;
    }
    if (state.pointB === 3 && state.pointA < 3){
      winGame("B");
      return;
    }
    if (state.pointA === 3 && state.pointB === 3){
      winGame("B");
    }
  }

  function incrementANormal(){
    if (!isDeuceState()){
      if (state.pointA <= 2){
        state.pointA += 1;
        return;
      }
      if (state.pointA === 3 && state.pointB < 3){
        winGame("A");
        return;
      }
      if (state.pointA === 3 && state.pointB === 3){
        state.pointA = 4;
        return;
      }
    } else {
      if (state.pointA === state.pointB){
        state.pointA += 1;
      } else if (state.pointA > state.pointB){
        winGame("A");
      } else {
        state.pointA = 3;
        state.pointB = 3;
      }
    }
  }

  function incrementBNormal(){
    if (!isDeuceState()){
      if (state.pointB <= 2){
        state.pointB += 1;
        return;
      }
      if (state.pointB === 3 && state.pointA < 3){
        winGame("B");
        return;
      }
      if (state.pointA === 3 && state.pointB === 3){
        state.pointB = 4;
        return;
      }
    } else {
      if (state.pointA === state.pointB){
        state.pointB += 1;
      } else if (state.pointB > state.pointA){
        winGame("B");
      } else {
        state.pointA = 3;
        state.pointB = 3;
      }
    }
  }

  function incrementA(){
    if (state.locked || state.matchFinished) return;
    saveHistory();

    const beforeSets = JSON.stringify(state.sets);

    if (state.mode === "golden") incrementAGolden();
    else incrementANormal();

    vibrate(25);

    const afterSets = JSON.stringify(state.sets);
    if (beforeSets === afterSets && !state.matchFinished){
      announcePoint();
    }

    render();
  }

  function incrementB(){
    if (state.locked || state.matchFinished) return;
    saveHistory();

    const beforeSets = JSON.stringify(state.sets);

    if (state.mode === "golden") incrementBGolden();
    else incrementBNormal();

    vibrate(25);

    const afterSets = JSON.stringify(state.sets);
    if (beforeSets === afterSets && !state.matchFinished){
      announcePoint();
    }

    render();
  }

  function getDisplayScore(team){
    if (state.matchFinished){
      return "0";
    }

    const a = state.pointA;
    const b = state.pointB;

    if (state.mode === "golden"){
      const labels = ["0","15","30","40"];
      return team === "A" ? labels[Math.min(a,3)] : labels[Math.min(b,3)];
    }

    if (a >= 3 && b >= 3){
      if (a === b) return "D";
      if (team === "A") return a > b ? "A" : "40";
      return b > a ? "A" : "40";
    }

    const labels = ["0","15","30","40","A"];
    return team === "A" ? labels[a] : labels[b];
  }

  function toggleMode(){
    saveHistory();
    state.mode = state.mode === "golden" ? "normal" : "golden";
    state.pointA = 0;
    state.pointB = 0;
    vibrate(35);
    render();
    speak(state.mode === "golden" ? "Golden point" : "Normal mode");
  }

  function toggleLock(){
    state.locked = !state.locked;
    vibrate(35);
    render();
    speak(state.locked ? "Locked" : "Unlocked");
  }

  function toggleAudio(){
    const wasEnabled = state.audioEnabled;
    state.audioEnabled = !state.audioEnabled;
    vibrate(35);
    render();

    if (!wasEnabled && state.audioEnabled){
      speak("Audio on");
    }
  }

  function toggleServer(){
    state.server = state.server === "A" ? "B" : "A";
    vibrate(35);
    render();
    speak("Server " + state.server);
  }

  function doReset(){
    saveHistory();
    state.pointA = 0;
    state.pointB = 0;
    state.sets = [
      { a: 0, b: 0 },
      { a: 0, b: 0 },
      { a: 0, b: 0 }
    ];
    state.currentSet = 0;
    state.matchFinished = false;
    state.server = "A";
    vibrate([40,40,40]);
    render();
    speak("Match reset");
  }

  function doUndo(){
    if (history.length === 0) return;
    state = history.pop();
    vibrate([30,30]);
    render();
    speak("Undo");
  }

  function render(){
    scoreAEl.textContent = getDisplayScore("A");
    scoreBEl.textContent = getDisplayScore("B");

    setEls.a1.textContent = state.sets[0].a;
    setEls.a2.textContent = state.sets[1].a;
    setEls.a3.textContent = state.sets[2].a;
    setEls.b1.textContent = state.sets[0].b;
    setEls.b2.textContent = state.sets[1].b;
    setEls.b3.textContent = state.sets[2].b;

    setLabel.textContent = "SET " + Math.min(state.currentSet + 1, 3);
    modeBtn.textContent = state.mode === "golden" ? "G" : "N";
    modeLabel.textContent = state.mode === "golden" ? "G - Golden" : "N - Normal";
    audioBtn.textContent = state.audioEnabled ? "Audio ON" : "Audio OFF";
    serverBtn.textContent = state.server === "A" ? "Srv A" : "Srv B";

    if (state.locked || state.matchFinished){
      scoreAEl.classList.add("disabled");
      scoreBEl.classList.add("disabled");
    } else {
      scoreAEl.classList.remove("disabled");
      scoreBEl.classList.remove("disabled");
    }

    if (state.locked){
      lockBtn.classList.add("locked");
    } else {
      lockBtn.classList.remove("locked");
    }
  }

  bindTap(scoreAEl, incrementA);
  bindTap(scoreBEl, incrementB);
  bindTap(modeBtn, toggleMode);
  bindTap(lockBtn, toggleLock);
  bindTap(audioBtn, toggleAudio);
  bindTap(serverBtn, toggleServer);
  bindTap(undoBtn, doUndo);

  resetBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    resetBtn.classList.add("holding");
    resetTimer = setTimeout(doReset, 800);
  }, { passive:false });

  resetBtn.addEventListener("touchend", function(){
    clearTimeout(resetTimer);
    resetBtn.classList.remove("holding");
  });

  resetBtn.addEventListener("touchcancel", function(){
    clearTimeout(resetTimer);
    resetBtn.classList.remove("holding");
  });

  undoBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    undoBtn.classList.add("holding");
    undoTimer = setTimeout(doUndo, 600);
  }, { passive:false });

  undoBtn.addEventListener("touchend", function(){
    clearTimeout(undoTimer);
    undoBtn.classList.remove("holding");
  });

  undoBtn.addEventListener("touchcancel", function(){
    clearTimeout(undoTimer);
    undoBtn.classList.remove("holding");
  });

  render();
</script>
</body>
</html>
