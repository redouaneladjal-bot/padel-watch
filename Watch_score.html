
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PadelTap Watch Layout V12</title>
<style>
:root{
  --bg:#123cbe;
  --yellow:#f2c300;
  --grey:#e9deef;
  --blue:#66d2ff;
  --blueBorder:#2c7aa8;
  --grid:rgba(234,244,255,0.52);
  --text:#f3f8ff;
  --textDark:#123047;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#d7d7d7;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

.shell{
  width:100vmin;
  height:100vmin;
  max-width:450px;
  max-height:450px;
  border-radius:50%;
  background:#232323;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

.watch{
  position:relative;
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  background:var(--bg);
  border:3px solid #081320;
}

/* safe area pushed slightly inward */
.safe{
  position:absolute;
  left:12%;
  top:12%;
  width:76%;
  height:76%;
  border-radius:50%;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#fff;
  background:var(--blue);
  border:2px solid var(--blueBorder);
  border-radius:50%;
  position:absolute;
}

/* top buttons moved inward */
.mode{
  width:54px;
  height:30px;
  border-radius:16px;
  font-size:14px;
  left:40%;
  top:2%;
  background:rgba(255,255,255,.14);
  border:2px solid rgba(255,255,255,.20);
}

.lock{
  width:48px;
  height:48px;
  left:56%;
  top:2%;
  font-size:18px;
}

.modeLabel{
  position:absolute;
  left:38%;
  top:11%;
  color:var(--text);
  font-size:11px;
  font-weight:bold;
}

.setLabel{
  position:absolute;
  left:4%;
  top:16%;
  color:var(--text);
  font-size:13px;
  font-weight:bold;
}

.sets{
  position:absolute;
  left:2%;
  top:24%;
  width:44%;
  color:var(--text);
}

.row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
}

.cell{
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.head{
  font-size:15px;
  font-weight:bold;
}

.row:not(:last-child) .cell{border-bottom:1px solid var(--grid);}
.row .cell:not(:last-child){border-right:1px solid var(--grid);}

/* score buttons slightly centered */
.score{
  position:absolute;
  width:34%;
  aspect-ratio:1/1;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  font-weight:bold;
  color:var(--textDark);
}

.scoreA{
  left:60%;
  top:22%;
  transform:translateX(-50%);
  background:var(--yellow);
}

.scoreB{
  left:60%;
  top:58%;
  transform:translateX(-50%);
  background:var(--grey);
}

/* bottom buttons moved inward */
.reset{
  width:60px;
  height:60px;
  left:12%;
  top:70%;
  font-size:22px;
}

.undo{
  width:60px;
  height:60px;
  left:42%;
  top:84%;
  transform:translate(-50%,-50%);
  font-size:22px;
}
</style>
</head>

<body>
<div class="shell">
<div class="watch">
<div class="safe">

<div class="btn mode">G</div>
<div class="btn lock">L</div>
<div class="modeLabel">G - Golden</div>

<div class="setLabel">SET 1</div>

<div class="sets">
<div class="row">
<div class="cell head">1</div>
<div class="cell head">2</div>
<div class="cell head">3</div>
</div>
<div class="row">
<div class="cell">0</div>
<div class="cell">0</div>
<div class="cell">0</div>
</div>
<div class="row">
<div class="cell">0</div>
<div class="cell">0</div>
<div class="cell">0</div>
</div>
</div>

<div class="score scoreA">0</div>
<div class="score scoreB">0</div>

<div class="btn reset">R</div>
<div class="btn undo">U</div>

</div>
</div>
</div>
</body>
</html>
