<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>PadelTap V28</title>
<style>
  :root{
    --bg:#123cbe;
    --yellow:#f2c300;
    --grey:#e9deef;
    --blue:#66d2ff;
    --blueBorder:#2c7aa8;
    --text:#f3f8ff;
    --textDark:#123047;
    --grid:rgba(255,255,255,0.45);
    --lock:#9b2b2b;
    --lockBorder:#6f1717;
    --glass:rgba(255,255,255,.18);
    --glassBorder:rgba(255,255,255,.28);
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:Arial,Helvetica,sans-serif;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    user-select:none;
  }

  #app{
    position:relative;
    width:100vw;
    height:100vh;
    background:var(--bg);
    overflow:hidden;
  }

  .pill{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    background:var(--glass);
    border:2px solid var(--glassBorder);
    border-radius:16px;
  }

  .circle-btn{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    border-radius:50%;
  }

  .mode{
    top:4%;
    left:28%;
    width:60px;
    height:30px;
    font-size:14px;
  }

  .modeLabel{
    position:absolute;
    top:13%;
    left:31%;
    font-size:11px;
    color:white;
    font-weight:bold;
  }

  .lock{
    top:4%;
    left:48%;
    width:50px;
    height:50px;
    font-size:18px;
  }

  .lock.locked{
    background:var(--lock);
    border-color:var(--lockBorder);
  }

  .audio{
    top:4%;
    left:64%;
    width:42px;
    height:30px;
    border-radius:16px;
    font-size:14px;
  }

  .server{
    top:67%;
    left:34%;
    width:82px;
    height:30px;
    font-size:12px;
  }

  .setLabel{
    position:absolute;
    left:12%;
    top:18%;
    font-weight:bold;
    color:white;
    font-size:13px;
  }

  .sets{
    position:absolute;
    left:9%;
    top:26%;
    width:40%;
    color:white;
  }

  .setsTable{
    display:table;
    width:100%;
    border-collapse:collapse;
  }

  .setsRow{
    display:table-row;
  }

  .setsCell{
    display:table-cell;
    height:38px;
    vertical-align:middle;
    text-align:center;
    font-size:20px;
    border-right:1px solid var(--grid);
  }

  .setsCell:last-child{ border-right:none; }

  .setsRow:not(:last-child) .setsCell{
    border-bottom:1px solid var(--grid);
  }

  .setsLabelCell{
    display:table-cell;
    width:18px;
    height:38px;
    vertical-align:middle;
    text-align:center;
    font-size:12px;
    font-weight:bold;
    padding-right:3px;
    border-right:3px solid;
  }

  .setsLabelCell.labelA{
    color:var(--grey);
    border-color:var(--grey);
  }

  .setsLabelCell.labelB{
    color:var(--yellow);
    border-color:var(--yellow);
  }

  .setsHead{
    font-size:15px;
    font-weight:bold;
  }

  .headLabel{
    display:table-cell;
    width:18px;
    padding-right:3px;
  }





  .row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
  }

  .cell{
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
  }

  .head{
    font-size:15px;
    font-weight:bold;
  }

  .row:not(:last-child) .cell{
    border-bottom:1px solid var(--grid);
  }

  .row .cell:not(:last-child){
    border-right:1px solid var(--grid);
  }

  .score{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    color:var(--textDark);
  }

  .scoreA{
    top:20%;
    left:58%;
    background:var(--grey);
    box-shadow:0 0 0 5px white;
  }

  .scoreB{
    top:54%;
    left:58%;
    background:var(--yellow);
  }

  .disabled{
    opacity:.72;
    filter:grayscale(0.08);
  }

  .reset{
    top:66%;
    left:13%;
    width:60px;
    height:60px;
    font-size:22px;
  }

  .undo{
    top:80%;
    left:44%;
    width:60px;
    height:60px;
    font-size:22px;
    transform:translateX(-50%);
  }

  .holding{
    background:var(--lock) !important;
    border-color:var(--lockBorder) !important;
  }

  .server.disabled-btn{
    opacity:0.35;
    pointer-events:none;
  }

  /* ── Server ball indicator ── */
  #serverBall{
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--yellow);
    border:2px solid white;
    box-shadow:0 0 6px rgba(0,0,0,0.4);
    transition: top 0.35s cubic-bezier(.4,0,.2,1), left 0.35s cubic-bezier(.4,0,.2,1);
    z-index:5;
    pointer-events:none;
  }

  /* ── Match finished overlay ── */
  #matchOverlay{
    display:none;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.85);
    z-index:100;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:16px;
    text-align:center;
  }

  #matchOverlay.show{ display:flex; }

  #matchOverlay h1{
    color:var(--yellow);
    font-size:28px;
    margin:0;
  }

  #matchOverlay .winner{
    color:white;
    font-size:22px;
    font-weight:bold;
  }

  #matchOverlay .finalScore{
    color:white;
    font-size:16px;
  }

  #matchOverlay .resetOverlayBtn{
    margin-top:8px;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    border-radius:12px;
    color:var(--textDark);
    font-size:18px;
    font-weight:bold;
    padding:10px 32px;
    cursor:pointer;
  }
</style>
</head>
<body>

<div id="app">
  <div class="pill mode" id="modeBtn">G</div>
  <div class="modeLabel" id="modeLabel">G - Golden</div>

  <div class="circle-btn lock" id="lockBtn">L</div>
  <div class="pill audio" id="audioBtn">A</div>

  <div class="pill server" id="serverBtn">Srv A</div>

  <div class="setLabel" id="setLabel">SET 1</div>

  <div class="sets">
    <div class="setsTable">
      <!-- Header row -->
      <div class="setsRow">
        <div class="headLabel"></div>
        <div class="setsCell setsHead">1</div>
        <div class="setsCell setsHead">2</div>
        <div class="setsCell setsHead">3</div>
      </div>
      <!-- Row A -->
      <div class="setsRow" id="rowA">
        <div class="setsLabelCell labelA">A</div>
        <div class="setsCell" id="setA1">0</div>
        <div class="setsCell" id="setA2">0</div>
        <div class="setsCell" id="setA3">0</div>
      </div>
      <!-- Row B -->
      <div class="setsRow" id="rowB">
        <div class="setsLabelCell labelB">B</div>
        <div class="setsCell" id="setB1">0</div>
        <div class="setsCell" id="setB2">0</div>
        <div class="setsCell" id="setB3">0</div>
      </div>
    </div>
  </div>

  <div class="score scoreA" id="scoreA">0</div>
  <div class="score scoreB" id="scoreB">0</div>

  <!-- Server ball indicator -->
  <div id="serverBall"></div>

  <div class="circle-btn reset" id="resetBtn">R</div>
  <div class="circle-btn undo" id="undoBtn">U</div>

  <div id="matchOverlay">
    <h1>MATCH FINI</h1>
    <div class="winner" id="overlayWinner"></div>
    <div class="finalScore" id="overlayScore"></div>
    <div class="resetOverlayBtn" id="resetOverlayBtn">Reset</div>
  </div>
</div>

<script>
(function () {
  const state = {
    pointA: 0,
    pointB: 0,
    sets: Array(5).fill(null).map(() => ({ a: 0, b: 0 })),
    currentSet: 0,
    locked: false,
    mode: "golden",
    matchFinished: false,
    audioEnabled: true,
    server: "A",
    winner: null,
    servePos: "left"  // left or right, alternates every point
  };

  const history = [];
  let resetTimer = null;
  let speechQueue = [];

  const els = {
    scoreA: document.getElementById("scoreA"),
    scoreB: document.getElementById("scoreB"),
    modeBtn: document.getElementById("modeBtn"),
    modeLabel: document.getElementById("modeLabel"),
    lockBtn: document.getElementById("lockBtn"),
    audioBtn: document.getElementById("audioBtn"),
    serverBtn: document.getElementById("serverBtn"),
    resetBtn: document.getElementById("resetBtn"),
    undoBtn: document.getElementById("undoBtn"),
    setLabel: document.getElementById("setLabel"),
    setA1: document.getElementById("setA1"),
    setA2: document.getElementById("setA2"),
    setA3: document.getElementById("setA3"),
    setB1: document.getElementById("setB1"),
    setB2: document.getElementById("setB2"),
    setB3: document.getElementById("setB3"),
    matchOverlay: document.getElementById("matchOverlay"),
    overlayWinner: document.getElementById("overlayWinner"),
    overlayScore: document.getElementById("overlayScore"),
    resetOverlayBtn: document.getElementById("resetOverlayBtn"),
    serverBall: document.getElementById("serverBall")
  };

  // ── Server ball position ──────────────────────────────────────────────────
  // Server A → ball top-left of scoreA
  // Server B → ball bottom-right of scoreB
  // After each game it alternates

  function updateServerBall() {
    const ball = els.serverBall;
    if (state.matchFinished) { ball.style.display = "none"; return; }
    ball.style.display = "block";

    const scoreAEl = els.scoreA;
    const scoreBEl = els.scoreB;
    const appEl = document.getElementById("app");
    const aR = scoreAEl.getBoundingClientRect();
    const bR = scoreBEl.getBoundingClientRect();
    const ar = appEl.getBoundingClientRect();
    const sz = 22, off = 4;

    // Server A = top circle (grey), ball on top edge, left or right
    // Server B = bottom circle (yellow), ball on bottom edge, left or right
    // servePos = "left" or "right", alternates every point
    // Server A starts LEFT each new game
    // Server B starts RIGHT each new game
    let left, top;
    if (state.server === "A") {
      top  = (aR.top - ar.top) - sz/2 + off;
      left = state.servePos === "left"
        ? (aR.left  - ar.left) - sz/2 + off
        : (aR.right - ar.left) - sz/2 - off;
    } else {
      top  = (bR.bottom - ar.top) - sz/2 - off;
      left = state.servePos === "right"
        ? (bR.right - ar.left) - sz/2 - off
        : (bR.left  - ar.left) - sz/2 + off;
    }
    ball.style.left = left + "px";
    ball.style.top  = top  + "px";
  }

  // ── Speech ────────────────────────────────────────────────────────────────

  function pickEnglishVoice() {
    const voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
    if (!voices || !voices.length) return null;
    return (
      voices.find(v => /en[-_]?US/i.test(v.lang) && /google|samsung|english|us/i.test(v.name)) ||
      voices.find(v => /en[-_]?GB/i.test(v.lang)) ||
      voices.find(v => /^en/i.test(v.lang)) ||
      null
    );
  }

  function speakNext() {
    if (!speechQueue.length || !state.audioEnabled) { speechQueue = []; return; }
    const text = speechQueue.shift();
    try {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US"; utter.rate = 0.82; utter.pitch = 0.92; utter.volume = 1.0;
      const voice = pickEnglishVoice();
      if (voice) utter.voice = voice;
      utter.onend = () => setTimeout(speakNext, 350);
      utter.onerror = () => setTimeout(speakNext, 350);
      speechSynthesis.speak(utter);
    } catch (_) { speakNext(); }
  }

  function speakSequence(phrases) {
    if (!state.audioEnabled) return;
    window.speechSynthesis.cancel();
    speechQueue = [...phrases];
    speakNext();
  }

  function speak(text) { speakSequence([text]); }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function vibrate(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern || 30); } catch (_) {}
  }

  function cloneState() { return JSON.parse(JSON.stringify(state)); }

  function saveHistory() {
    history.push(cloneState());
    if (history.length > 100) history.shift();
  }

  function bindTap(el, handler) {
    let touched = false;
    el.addEventListener("touchstart", function (e) {
      touched = true; e.preventDefault(); handler();
    }, { passive: false });
    el.addEventListener("click", function (e) {
      if (touched) { touched = false; return; }
      e.preventDefault(); handler();
    });
  }

  function tennisWord(v) {
    if (v === 0) return "love";
    if (v === 1) return "15";
    if (v === 2) return "30";
    return "40";
  }

  function isSetFinished(s) {
    return (s.a >= 6 || s.b >= 6) && Math.abs(s.a - s.b) >= 2;
  }

  function setsWon(team) {
    return state.sets.filter(s => {
      if (!isSetFinished(s)) return false;
      return team === "A" ? s.a > s.b : s.b > s.a;
    }).length;
  }

  function getDisplayScore(team) {
    if (state.matchFinished) return "0";
    const a = state.pointA, b = state.pointB;
    if (state.mode === "golden") {
      const labels = ["0","15","30","40"];
      return team === "A" ? labels[Math.min(a,3)] : labels[Math.min(b,3)];
    }
    if (a >= 3 && b >= 3) {
      if (a === b) return "D";
      if (team === "A") return a > b ? "A" : "40";
      return b > a ? "A" : "40";
    }
    const labels = ["0","15","30","40","A"];
    return team === "A" ? labels[a] : labels[b];
  }

  // ── Announce ──────────────────────────────────────────────────────────────

  function announcePoint() {
    if (state.matchFinished) return;
    if (state.mode === "normal" && state.pointA >= 3 && state.pointB >= 3) {
      if (state.pointA === state.pointB) { speak("Deuce"); return; }
      const advTeam = state.pointA > state.pointB ? "A" : "B";
      speak(advTeam === state.server ? "Advantage, server" : "Advantage, receiver");
      return;
    }
    const aText = tennisWord(state.pointA);
    const bText = tennisWord(state.pointB);
    const first  = state.server === "A" ? aText : bText;
    const second = state.server === "A" ? bText : aText;
    speak(first === second ? first + ", all" : first + ", " + second);
  }

  function finalScoreString() {
    const limit = Math.min(state.currentSet, 4);
    const arr = [];
    for (let i = 0; i <= limit; i++) {
      arr.push(state.sets[i].a + " to " + state.sets[i].b);
    }
    return arr.join(", ");
  }

  function announceGame(team, setScore, setJustFinished, matchFinishedNow) {
    const serverName  = "Team " + state.server;
    const teamName    = "Team " + team;
    // Score announced from server's perspective first
    const serverScore = state.server === "A" ? setScore.a : setScore.b;
    const receiverScore = state.server === "A" ? setScore.b : setScore.a;
    const gameScore   = serverScore + " to " + receiverScore;

    if (matchFinishedNow) {
      speakSequence(["Game, set and match " + teamName + "!", "Final score, " + finalScoreString()]);
      return;
    }
    if (setJustFinished) {
      speakSequence(["Set " + teamName + ".", gameScore + ".", serverName + " to serve"]);
      return;
    }
    speakSequence([teamName + " wins the game.", gameScore + ".", serverName + " to serve"]);
  }

  // ── Core logic ────────────────────────────────────────────────────────────

  function winGame(team) {
    if (state.matchFinished) return;
    const current = state.sets[state.currentSet];
    if (team === "A") current.a += 1;
    else current.b += 1;

    const setScoreSnapshot = { a: current.a, b: current.b };
    state.pointA = 0;
    state.pointB = 0;

    const setJustFinished = isSetFinished(current);
    let matchFinishedNow = false;

    if (setJustFinished) {
      const wA = setsWon("A"), wB = setsWon("B");
      if (wA >= 3) { state.matchFinished = true; state.winner = "A"; matchFinishedNow = true; }
      else if (wB >= 3) { state.matchFinished = true; state.winner = "B"; matchFinishedNow = true; }
      else if (state.currentSet < 4) state.currentSet += 1;
    }

    if (!matchFinishedNow) {
      state.server = state.server === "A" ? "B" : "A";
      // A starts left, B starts right
      state.servePos = state.server === "A" ? "left" : "right";
    }

    announceGame(team, setScoreSnapshot, setJustFinished, matchFinishedNow);
  }

  function incrementAGolden() {
    if (state.pointA <= 2) { state.pointA += 1; return; }
    winGame("A");
  }

  function incrementBGolden() {
    if (state.pointB <= 2) { state.pointB += 1; return; }
    winGame("B");
  }

  function incrementANormal() {
    const a = state.pointA, b = state.pointB;
    if (a < 3)             { state.pointA += 1; return; }
    if (a === 3 && b < 3)  { winGame("A"); return; }
    if (a === 3 && b === 3){ state.pointA = 4; return; }
    if (a === 4 && b === 3){ winGame("A"); return; }
    if (a === 3 && b === 4){ state.pointA = 3; state.pointB = 3; }
  }

  function incrementBNormal() {
    const a = state.pointA, b = state.pointB;
    if (b < 3)             { state.pointB += 1; return; }
    if (b === 3 && a < 3)  { winGame("B"); return; }
    if (b === 3 && a === 3){ state.pointB = 4; return; }
    if (b === 4 && a === 3){ winGame("B"); return; }
    if (b === 3 && a === 4){ state.pointA = 3; state.pointB = 3; }
  }

  function incrementA() {
    if (state.locked || state.matchFinished) return;
    saveHistory();
    const beforeSets = JSON.stringify(state.sets);
    if (state.mode === "golden") incrementAGolden();
    else incrementANormal();
    vibrate(25);
    const gameEnded = JSON.stringify(state.sets) !== beforeSets;
    // Only toggle servePos if no game ended (winGame already resets it)
    if (!gameEnded) state.servePos = state.servePos === "left" ? "right" : "left";
    if (!gameEnded && !state.matchFinished) announcePoint();
    render();
  }

  function incrementB() {
    if (state.locked || state.matchFinished) return;
    saveHistory();
    const beforeSets = JSON.stringify(state.sets);
    if (state.mode === "golden") incrementBGolden();
    else incrementBNormal();
    vibrate(25);
    const gameEnded = JSON.stringify(state.sets) !== beforeSets;
    // Only toggle servePos if no game ended (winGame already resets it)
    if (!gameEnded) state.servePos = state.servePos === "left" ? "right" : "left";
    if (!gameEnded && !state.matchFinished) announcePoint();
    render();
  }

  function toggleMode() {
    saveHistory();
    state.mode = state.mode === "golden" ? "normal" : "golden";
    state.pointA = 0; state.pointB = 0;
    state.servePos = state.server === "A" ? "left" : "right";
    vibrate(35); render();
    speak(state.mode === "golden" ? "Golden point" : "Normal mode");
  }

  function toggleLock() {
    state.locked = !state.locked;
    vibrate(35); render();
    speak(state.locked ? "Locked" : "Unlocked");
  }

  function toggleAudio() {
    const was = state.audioEnabled;
    state.audioEnabled = !state.audioEnabled;
    vibrate(35); render();
    if (!was && state.audioEnabled) speak("Audio on");
  }

  function toggleServer() {
    state.server = state.server === "A" ? "B" : "A";
    state.servePos = state.server === "A" ? "left" : "right";
    vibrate(35); render();
    speak("Team " + state.server + " to serve");
  }

  function doReset() {
    saveHistory();
    state.pointA = 0; state.pointB = 0;
    state.sets = Array(5).fill(null).map(() => ({ a: 0, b: 0 }));
    state.currentSet = 0;
    state.matchFinished = false;
    state.winner = null;
    state.server = "A";
    state.servePos = "left"; // A starts left, B starts right
    vibrate([40,40,40]); render();
    speak("Match reset");
  }

  function doUndo() {
    if (!history.length) return;
    const prevAudio = state.audioEnabled;
    const prev = history.pop();
    Object.keys(state).forEach(k => delete state[k]);
    Object.assign(state, prev);
    state.audioEnabled = prevAudio;
    vibrate([30,30]); render();
    speak("Undo");
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function render() {
    els.scoreA.textContent = getDisplayScore("A");
    els.scoreB.textContent = getDisplayScore("B");

    els.setA1.textContent = state.sets[0].a;
    els.setA2.textContent = state.sets[1].a;
    els.setA3.textContent = state.sets[2].a;
    els.setB1.textContent = state.sets[0].b;
    els.setB2.textContent = state.sets[1].b;
    els.setB3.textContent = state.sets[2].b;

    els.setLabel.textContent = "SET " + Math.min(state.currentSet + 1, 5);
    els.modeBtn.textContent = state.mode === "golden" ? "G" : "N";
    els.modeLabel.textContent = state.mode === "golden" ? "G - Golden" : "N - Normal";
    els.audioBtn.textContent = state.audioEnabled ? "A" : "M";
    els.serverBtn.textContent = "Srv " + state.server;
    // Grey out server button once a point has been played
    const pointsPlayed = state.pointA + state.pointB > 0;
    if (pointsPlayed) els.serverBtn.classList.add("disabled-btn");
    else els.serverBtn.classList.remove("disabled-btn");

    if (state.locked || state.matchFinished) {
      els.scoreA.classList.add("disabled");
      els.scoreB.classList.add("disabled");
    } else {
      els.scoreA.classList.remove("disabled");
      els.scoreB.classList.remove("disabled");
    }

    if (state.locked) els.lockBtn.classList.add("locked");
    else els.lockBtn.classList.remove("locked");

    if (state.matchFinished && state.winner) {
      els.overlayWinner.textContent = "🏆 Team " + state.winner + " wins!";
      const finalSets = state.sets
        .filter((s, i) => i <= state.currentSet)
        .map(s => s.a + "-" + s.b).join("  ");
      els.overlayScore.textContent = finalSets;
      els.matchOverlay.classList.add("show");
    } else {
      els.matchOverlay.classList.remove("show");
    }

    // Update server ball after DOM paint
    requestAnimationFrame(updateServerBall);
  }

  // ── Events ────────────────────────────────────────────────────────────────

  bindTap(els.scoreA, incrementA);
  bindTap(els.scoreB, incrementB);
  bindTap(els.modeBtn, toggleMode);
  bindTap(els.lockBtn, toggleLock);
  bindTap(els.audioBtn, toggleAudio);
  bindTap(els.serverBtn, toggleServer);
  bindTap(els.undoBtn, doUndo);
  bindTap(els.resetOverlayBtn, doReset);

  els.resetBtn.addEventListener("touchstart", function (e) {
    e.preventDefault();
    els.resetBtn.classList.add("holding");
    resetTimer = setTimeout(doReset, 800);
  }, { passive: false });
  els.resetBtn.addEventListener("touchend", function () { clearTimeout(resetTimer); els.resetBtn.classList.remove("holding"); });
  els.resetBtn.addEventListener("touchcancel", function () { clearTimeout(resetTimer); els.resetBtn.classList.remove("holding"); });
  // Desktop support for R button
  els.resetBtn.addEventListener("mousedown", function () {
    els.resetBtn.classList.add("holding");
    resetTimer = setTimeout(doReset, 800);
  });
  els.resetBtn.addEventListener("mouseup", function () { clearTimeout(resetTimer); els.resetBtn.classList.remove("holding"); });
  els.resetBtn.addEventListener("mouseleave", function () { clearTimeout(resetTimer); els.resetBtn.classList.remove("holding"); });

  if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = function () {};
  }

  window.addEventListener("resize", () => requestAnimationFrame(updateServerBall));

  render();
})();
</script>
</body>
</html>
