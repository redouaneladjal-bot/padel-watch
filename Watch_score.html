<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>PadelTap V34</title>
<style>
  :root{
    --bg:#123cbe;
    --yellow:#f2c300;
    --grey:#e9deef;
    --blue:#66d2ff;
    --blueBorder:#2c7aa8;
    --text:#f3f8ff;
    --textDark:#123047;
    --grid:rgba(255,255,255,0.45);
    --lock:#9b2b2b;
    --lockBorder:#6f1717;
    --glass:rgba(255,255,255,.18);
    --glassBorder:rgba(255,255,255,.28);
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:Arial,Helvetica,sans-serif;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    user-select:none;
  }

  #app{
    position:relative;
    width:100vw;
    height:100vh;
    background:var(--bg);
    overflow:hidden;
  }

  .pill{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    background:var(--glass);
    border:2px solid var(--glassBorder);
    border-radius:16px;
  }

  .circle-btn{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    border-radius:50%;
  }

  .mode{
    top:4%;
    left:28%;
    width:60px;
    height:30px;
    font-size:14px;
  }

  .modeLabel{
    position:absolute;
    top:13%;
    left:31%;
    font-size:11px;
    color:white;
    font-weight:bold;
  }

  .lock{
    top:4%;
    left:48%;
    width:50px;
    height:50px;
    font-size:18px;
  }

  .lock.locked{
    background:var(--lock);
    border-color:var(--lockBorder);
  }

  .audio{
    top:4%;
    left:62%;
    width:52px;
    height:30px;
    border-radius:16px;
    font-size:12px;
  }



  .server{
    top:67%;
    left:34%;
    width:82px;
    height:30px;
    font-size:12px;
  }

  .setLabel{
    position:absolute;
    left:12%;
    top:18%;
    font-weight:bold;
    color:white;
    font-size:13px;
  }

  .sets{
    position:absolute;
    left:9%;
    top:26%;
    width:40%;
    color:white;
  }

  .setsTable{
    display:table;
    width:100%;
    border-collapse:collapse;
  }

  .setsRow{
    display:table-row;
  }

  .setsCell{
    display:table-cell;
    height:38px;
    vertical-align:middle;
    text-align:center;
    font-size:20px;
    border-right:1px solid var(--grid);
  }

  .setsCell:last-child{ border-right:none; }

  .setsRow:not(:last-child) .setsCell{
    border-bottom:1px solid var(--grid);
  }

  .setsLabelCell{
    display:table-cell;
    width:18px;
    height:38px;
    vertical-align:middle;
    text-align:center;
    font-size:12px;
    font-weight:bold;
    padding-right:3px;
    border-right:3px solid;
  }

  .setsLabelCell.labelA{
    color:var(--grey);
    border-color:var(--grey);
  }

  .setsLabelCell.labelB{
    color:var(--yellow);
    border-color:var(--yellow);
  }

  .setsHead{
    font-size:15px;
    font-weight:bold;
  }

  .headLabel{
    display:table-cell;
    width:18px;
    padding-right:3px;
  }





  .row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
  }

  .cell{
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
  }

  .head{
    font-size:15px;
    font-weight:bold;
  }

  .row:not(:last-child) .cell{
    border-bottom:1px solid var(--grid);
  }

  .row .cell:not(:last-child){
    border-right:1px solid var(--grid);
  }

  .score{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    color:var(--textDark);
  }

  .scoreA{
    top:20%;
    left:58%;
    background:var(--grey);
    box-shadow:0 0 0 5px white;
  }

  .scoreB{
    top:54%;
    left:58%;
    background:var(--yellow);
  }

  .disabled{
    opacity:.72;
    filter:grayscale(0.08);
  }

  .reset{
    top:66%;
    left:13%;
    width:60px;
    height:60px;
    font-size:22px;
  }

  .undo{
    top:80%;
    left:44%;
    width:60px;
    height:60px;
    font-size:22px;
    transform:translateX(-50%);
  }

  .holding{
    background:var(--lock) !important;
    border-color:var(--lockBorder) !important;
  }

  .server.disabled-btn{
    opacity:0.35;
    pointer-events:none;
  }

  /* ── Server ball indicator ── */
  #serverBall{
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--yellow);
    border:2px solid white;
    box-shadow:0 0 6px rgba(0,0,0,0.4);
    transition: top 0.35s cubic-bezier(.4,0,.2,1), left 0.35s cubic-bezier(.4,0,.2,1);
    z-index:5;
    pointer-events:none;
  }

  /* ── Match finished overlay ── */
  #matchOverlay{
    display:none;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.85);
    z-index:100;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:16px;
    text-align:center;
  }

  #matchOverlay.show{ display:flex; }

  #matchOverlay h1{
    color:var(--yellow);
    font-size:28px;
    margin:0;
  }

  #matchOverlay .winner{
    color:white;
    font-size:22px;
    font-weight:bold;
  }

  #matchOverlay .finalScore{
    color:white;
    font-size:16px;
  }

  #matchOverlay .resetOverlayBtn{
    margin-top:8px;
    background:var(--blue);
    border:2px solid var(--blueBorder);
    border-radius:12px;
    color:var(--textDark);
    font-size:18px;
    font-weight:bold;
    padding:10px 32px;
    cursor:pointer;
  }
  /* ── Set/Match point banner ── */
  #banner{
    position:absolute; top:0; left:0; right:0;
    background:rgba(242,195,0,0.95); color:#123047;
    font-size:11px; font-weight:bold; text-align:center;
    padding:3px 0; z-index:50;
    transform:translateY(-100%);
    transition:transform 0.3s ease;
  }
  #banner.show{ transform:translateY(0); }
</style>
</head>
<body>

<div id="app">
  <div id="banner"></div>
  <div class="pill mode" id="modeBtn">G</div>
  <div class="modeLabel" id="modeLabel">G - Golden</div>

  <div class="circle-btn lock" id="lockBtn">L</div>
  <div class="pill audio" id="audioBtn">EN</div>

  <div class="pill server" id="serverBtn">Srv A</div>

  <div class="setLabel" id="setLabel">SET 1</div>

  <div class="sets">
    <div class="setsTable">
      <!-- Header row -->
      <div class="setsRow">
        <div class="headLabel"></div>
        <div class="setsCell setsHead" id="setH1">1</div>
        <div class="setsCell setsHead" id="setH2">2</div>
        <div class="setsCell setsHead" id="setH3">3</div>
      </div>
      <!-- Row A -->
      <div class="setsRow" id="rowA">
        <div class="setsLabelCell labelA">A</div>
        <div class="setsCell" id="setA1">0</div>
        <div class="setsCell" id="setA2">0</div>
        <div class="setsCell" id="setA3">0</div>
      </div>
      <!-- Row B -->
      <div class="setsRow" id="rowB">
        <div class="setsLabelCell labelB">B</div>
        <div class="setsCell" id="setB1">0</div>
        <div class="setsCell" id="setB2">0</div>
        <div class="setsCell" id="setB3">0</div>
      </div>
    </div>
  </div>

  <div class="score scoreA" id="scoreA">0</div>
  <div class="score scoreB" id="scoreB">0</div>

  <!-- Server ball indicator -->
  <div id="serverBall"></div>

  <div class="circle-btn reset" id="resetBtn">R</div>
  <div class="circle-btn undo" id="undoBtn">U</div>

  <div id="matchOverlay">
    <h1>MATCH FINI</h1>
    <div class="winner" id="overlayWinner"></div>
    <div class="finalScore" id="overlayScore"></div>
    <div class="resetOverlayBtn" id="resetOverlayBtn">Reset</div>
  </div>
</div>


</html>
<script>
(function(){

const T={
  EN:{love:"love",f15:"15",f30:"30",f40:"40",deuce:"Deuce",advServer:"Advantage server",advReceiver:"Advantage receiver",winsGame:(t,s,srv)=>[`Team ${t} wins the game.`,`${s}.`,`Team ${srv} to serve`],winsSet:(t,s,srv)=>[`Set Team ${t}.`,`${s}.`,`Team ${srv} to serve`],winsMatch:(t,s)=>[`Game set and match Team ${t}!`,`Final score ${s}`],setPoint:(t)=>`Set point Team ${t}`,matchPoint:(t)=>`Match point Team ${t}`,undo:"Undo",reset:"Match reset",locked:"Locked",unlocked:"Unlocked",golden:"Golden point",normal:"Normal mode",audioOn:"Audio on",srvTeam:(t)=>`Team ${t} to serve`},
  FR:{love:"zéro",f15:"quinze",f30:"trente",f40:"quarante",deuce:"Égalité",advServer:"Avantage serveur",advReceiver:"Avantage receveur",winsGame:(t,s,srv)=>[`Jeu équipe ${t}.`,`${s}.`,`Équipe ${srv} au service`],winsSet:(t,s,srv)=>[`Jeu et set équipe ${t}.`,`${s}.`,`Équipe ${srv} au service`],winsMatch:(t,s)=>[`Jeu set et match équipe ${t} !`,`Score final ${s}`],setPoint:(t)=>`Balle de set équipe ${t}`,matchPoint:(t)=>`Balle de match équipe ${t}`,undo:"Annuler",reset:"Match réinitialisé",locked:"Verrouillé",unlocked:"Déverrouillé",golden:"Point d'or",normal:"Mode normal",audioOn:"Audio activé",srvTeam:(t)=>`Équipe ${t} au service`}
};

// Audio mode cycles: EN → FR → MUTE → EN
const AUDIO_MODES = ["EN","FR","MUTE"];

const state={
  pointA:0,pointB:0,
  sets:Array(5).fill(null).map(()=>({a:0,b:0})),
  currentSet:0,locked:false,mode:"golden",
  matchFinished:false,
  server:"A",winner:null,
  servePos:"left",matchStarted:false,
  audioMode:"EN"  // EN | FR | MUTE
};
const history=[];
let resetTimer=null,speechQueue=[],bannerTimer=null;

// Helpers
function lang(){ return state.audioMode==="MUTE" ? "EN" : state.audioMode; }
function isMuted(){ return state.audioMode==="MUTE"; }
function t(){ return T[lang()]; }

const ids=id=>document.getElementById(id);
const els={
  scoreA:ids("scoreA"),scoreB:ids("scoreB"),
  modeBtn:ids("modeBtn"),modeLabel:ids("modeLabel"),
  lockBtn:ids("lockBtn"),audioBtn:ids("audioBtn"),
  serverBtn:ids("serverBtn"),resetBtn:ids("resetBtn"),undoBtn:ids("undoBtn"),
  setLabel:ids("setLabel"),
  setH1:ids("setH1"),setH2:ids("setH2"),setH3:ids("setH3"),
  setA1:ids("setA1"),setA2:ids("setA2"),setA3:ids("setA3"),
  setB1:ids("setB1"),setB2:ids("setB2"),setB3:ids("setB3"),
  matchOverlay:ids("matchOverlay"),overlayWinner:ids("overlayWinner"),
  overlayScore:ids("overlayScore"),resetOverlayBtn:ids("resetOverlayBtn"),
  banner:ids("banner")
};

// ── Speech ────────────────────────────────────────────────────────────────────
function pickVoice(l){const v=speechSynthesis.getVoices()||[];if(l==="FR")return v.find(x=>/fr[-_]?FR/i.test(x.lang))||v.find(x=>/^fr/i.test(x.lang))||null;return v.find(x=>/en[-_]?US/i.test(x.lang)&&/google|samsung/i.test(x.name))||v.find(x=>/^en/i.test(x.lang))||null;}

function speakNext(){
  if(!speechQueue.length||isMuted()){speechQueue=[];return;}
  const text=speechQueue.shift();
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang()==="FR"?"fr-FR":"en-US";
    u.rate=0.82;u.pitch=0.92;u.volume=1.0;
    const v=pickVoice(lang());if(v)u.voice=v;
    u.onend=()=>setTimeout(speakNext,350);
    u.onerror=()=>setTimeout(speakNext,350);
    speechSynthesis.speak(u);
  }catch(_){setTimeout(speakNext,100);}
}
function speakSequence(phrases){
  if(isMuted())return;
  speechSynthesis.cancel();
  speechQueue=[...phrases];
  setTimeout(speakNext,200);
}
function speak(text){speakSequence([text]);}

// ── Banner ────────────────────────────────────────────────────────────────────
function showBanner(text){
  els.banner.textContent=text;
  els.banner.classList.add("show");
  clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>els.banner.classList.remove("show"),2500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function vibrate(p){try{if(navigator.vibrate)navigator.vibrate(p||30);}catch(_){}}
function cloneState(){return JSON.parse(JSON.stringify(state));}
function saveHistory(){history.push(cloneState());if(history.length>100)history.shift();}
function bindTap(el,fn){if(!el)return;let touched=false;el.addEventListener("touchstart",e=>{touched=true;e.preventDefault();fn();},{passive:false});el.addEventListener("click",e=>{if(touched){touched=false;return;}e.preventDefault();fn();});}
function scoreJoin(a,b){return lang()==="FR"?`${a} à ${b}`:`${a} to ${b}`;}
function tennisWord(v){if(v===0)return t().love;if(v===1)return t().f15;if(v===2)return t().f30;return t().f40;}
function isSetFinished(s){return(s.a>=6||s.b>=6)&&Math.abs(s.a-s.b)>=2;}
function setsWon(team){return state.sets.filter(s=>{if(!isSetFinished(s))return false;return team==="A"?s.a>s.b:s.b>s.a;}).length;}

function currentGameScoreStr(){
  const a=state.pointA,b=state.pointB;
  if(state.mode==="normal"&&a>=3&&b>=3){if(a===b)return t().deuce;const adv=a>b?"A":"B";return adv===state.server?t().advServer:t().advReceiver;}
  const aT=tennisWord(a),bT=tennisWord(b);
  const first=state.server==="A"?aT:bT,second=state.server==="A"?bT:aT;
  const allW=lang()==="FR"?"partout":"all";
  return first===second?`${first} ${allW}`:`${first} ${second}`;
}

function isOnePointFromGame(team){const a=state.pointA,b=state.pointB;if(team==="A"){if(state.mode==="golden")return a===3;return(a===3&&b<3)||a===4;}if(state.mode==="golden")return b===3;return(b===3&&a<3)||b===4;}
function isOneGameFromSet(team){const c=state.sets[state.currentSet];return team==="A"?(c.a===5&&c.a>c.b):(c.b===5&&c.b>c.a);}

function checkSpecialPoint(){
  const sA=setsWon("A"),sB=setsWon("B");
  const spA=isOneGameFromSet("A")&&isOnePointFromGame("A");
  const spB=isOneGameFromSet("B")&&isOnePointFromGame("B");
  const mpA=sA===2&&spA,mpB=sB===2&&spB;
  const gs=currentGameScoreStr();
  if(mpA){const l=t().matchPoint("A");showBanner(l);speakSequence([gs,l]);return true;}
  if(mpB){const l=t().matchPoint("B");showBanner(l);speakSequence([gs,l]);return true;}
  if(spA){const l=t().setPoint("A");showBanner(l);speakSequence([gs,l]);return true;}
  if(spB){const l=t().setPoint("B");showBanner(l);speakSequence([gs,l]);return true;}
  return false;
}

function getDisplayScore(team){if(state.matchFinished)return"0";const a=state.pointA,b=state.pointB;if(state.mode==="golden"){const l=["0","15","30","40"];return team==="A"?l[Math.min(a,3)]:l[Math.min(b,3)];}if(a>=3&&b>=3){if(a===b)return"D";if(team==="A")return a>b?"A":"40";return b>a?"A":"40";}const l=["0","15","30","40","A"];return team==="A"?l[a]:l[b];}
function finalScoreStr(){const lim=Math.min(state.currentSet,4);return Array.from({length:lim+1},(_,i)=>scoreJoin(state.sets[i].a,state.sets[i].b)).join(", ");}
function announceGame(team,snap,setDone,matchNow){const srv=state.server;const gs=srv==="A"?scoreJoin(snap.a,snap.b):scoreJoin(snap.b,snap.a);if(matchNow){speakSequence(t().winsMatch(team,finalScoreStr()));return;}if(setDone){speakSequence(t().winsSet(team,gs,srv));return;}speakSequence(t().winsGame(team,gs,srv));}

function winGame(team){if(state.matchFinished)return;const cur=state.sets[state.currentSet];if(team==="A")cur.a++;else cur.b++;const snap={a:cur.a,b:cur.b};state.pointA=0;state.pointB=0;const setDone=isSetFinished(cur);let matchNow=false;if(setDone){const wA=setsWon("A"),wB=setsWon("B");if(wA>=3){state.matchFinished=true;state.winner="A";matchNow=true;}else if(wB>=3){state.matchFinished=true;state.winner="B";matchNow=true;}else if(state.currentSet<4)state.currentSet++;}if(!matchNow){state.server=state.server==="A"?"B":"A";state.servePos=state.server==="A"?"left":"right";}announceGame(team,snap,setDone,matchNow);}

function incrementA(){if(state.locked||state.matchFinished)return;saveHistory();state.matchStarted=true;const before=JSON.stringify(state.sets);if(state.mode==="golden"){if(state.pointA<=2)state.pointA++;else winGame("A");}else{const a=state.pointA,b=state.pointB;if(a<3)state.pointA++;else if(a===3&&b<3)winGame("A");else if(a===3&&b===3)state.pointA=4;else if(a===4&&b===3)winGame("A");else if(a===3&&b===4){state.pointA=3;state.pointB=3;}}vibrate(25);if(JSON.stringify(state.sets)===before&&!state.matchFinished){state.servePos=state.servePos==="left"?"right":"left";if(!checkSpecialPoint())speak(currentGameScoreStr());}render();}
function incrementB(){if(state.locked||state.matchFinished)return;saveHistory();state.matchStarted=true;const before=JSON.stringify(state.sets);if(state.mode==="golden"){if(state.pointB<=2)state.pointB++;else winGame("B");}else{const a=state.pointA,b=state.pointB;if(b<3)state.pointB++;else if(b===3&&a<3)winGame("B");else if(b===3&&a===3)state.pointB=4;else if(b===4&&a===3)winGame("B");else if(b===3&&a===4){state.pointA=3;state.pointB=3;}}vibrate(25);if(JSON.stringify(state.sets)===before&&!state.matchFinished){state.servePos=state.servePos==="left"?"right":"left";if(!checkSpecialPoint())speak(currentGameScoreStr());}render();}

function toggleMode(){saveHistory();state.mode=state.mode==="golden"?"normal":"golden";state.pointA=0;state.pointB=0;state.servePos=state.server==="A"?"left":"right";vibrate(35);render();speak(state.mode==="golden"?t().golden:t().normal);}
function toggleLock(){state.locked=!state.locked;vibrate(35);render();speak(state.locked?t().locked:t().unlocked);}

function cycleAudioMode(){
  const idx = AUDIO_MODES.indexOf(state.audioMode);
  state.audioMode = AUDIO_MODES[(idx+1) % AUDIO_MODES.length];
  vibrate(35);
  render();
  // Announce new mode if not muted
  if(!isMuted()) speak(t().audioOn);
}

function toggleServer(){if(state.matchStarted)return;state.server=state.server==="A"?"B":"A";state.servePos=state.server==="A"?"left":"right";vibrate(35);render();speak(t().srvTeam(state.server));}
function doReset(){saveHistory();state.pointA=0;state.pointB=0;state.sets=Array(5).fill(null).map(()=>({a:0,b:0}));state.currentSet=0;state.matchFinished=false;state.winner=null;state.server="A";state.servePos="left";state.matchStarted=false;vibrate([40,40,40]);render();speak(t().reset);}
function doUndo(){if(!history.length)return;const pAM=state.audioMode,prev=history.pop();Object.keys(state).forEach(k=>delete state[k]);Object.assign(state,prev);state.audioMode=pAM;vibrate([30,30]);render();speak(t().undo);}

// ── Server ball ───────────────────────────────────────────────────────────────
function updateServerBall(){
  const b=document.getElementById("serverBall");
  if(!b)return;
  if(state.matchFinished){b.style.display="none";return;}
  b.style.display="block";
  const aR=els.scoreA.getBoundingClientRect();
  const bR=els.scoreB.getBoundingClientRect();
  const ar=document.getElementById("app").getBoundingClientRect();
  const sz=22,off=4;
  let left,top;
  if(state.server==="A"){
    top=(aR.top-ar.top)-sz/2+off;
    left=state.servePos==="left"?(aR.left-ar.left)-sz/2+off:(aR.right-ar.left)-sz/2-off;
  }else{
    top=(bR.bottom-ar.top)-sz/2-off;
    left=state.servePos==="right"?(bR.right-ar.left)-sz/2-off:(bR.left-ar.left)-sz/2+off;
  }
  b.style.left=left+"px";
  b.style.top=top+"px";
}

// ── Render ────────────────────────────────────────────────────────────────────
function audioBtnLabel(){
  if(state.audioMode==="EN") return "🔊EN";
  if(state.audioMode==="FR") return "🔊FR";
  return "🔇";
}

function render(){
  els.scoreA.textContent=getDisplayScore("A");
  els.scoreB.textContent=getDisplayScore("B");

  const vi=[0,1,2].map(i=>{const s=state.currentSet<=2?0:state.currentSet===3?1:2;return s+i;});
  [els.setH1,els.setH2,els.setH3].forEach((el,i)=>{if(el)el.textContent=(vi[i]+1);});
  [[els.setA1,els.setA2,els.setA3],[els.setB1,els.setB2,els.setB3]].forEach((cells,row)=>{
    cells.forEach((el,i)=>{
      if(!el)return;
      el.textContent=row===0?state.sets[vi[i]].a:state.sets[vi[i]].b;
      el.className="setsCell"+(vi[i]===state.currentSet?" active-score":" inactive-score");
    });
  });

  els.setLabel.textContent="SET "+(Math.min(state.currentSet+1,5));
  els.modeBtn.textContent=state.mode==="golden"?"G":"N";
  if(els.modeLabel)els.modeLabel.textContent=state.mode==="golden"?"G - Golden":"N - Normal";
  els.lockBtn.textContent=state.locked?"🔒":"🔓";
  els.audioBtn.textContent=audioBtnLabel();
  els.audioBtn.style.opacity=state.audioMode==="MUTE"?"0.45":"1";
  if(els.serverBtn){
    els.serverBtn.textContent="Srv "+state.server;
    els.serverBtn.classList.toggle("disabled-btn",state.matchStarted);
  }

  const dis=state.locked||state.matchFinished;
  els.scoreA.classList.toggle("disabled",dis);
  els.scoreB.classList.toggle("disabled",dis);
  els.lockBtn.classList.toggle("locked",state.locked);

  if(state.matchFinished&&state.winner){
    els.overlayWinner.textContent="🏆 Team "+state.winner+" wins!";
    els.overlayScore.textContent=state.sets.filter((_,i)=>i<=state.currentSet).map(s=>s.a+"-"+s.b).join("  ");
    els.matchOverlay.classList.add("show");
  }else{
    els.matchOverlay.classList.remove("show");
  }
  requestAnimationFrame(updateServerBall);
}

// ── Events ────────────────────────────────────────────────────────────────────
bindTap(els.scoreA,incrementA);bindTap(els.scoreB,incrementB);
bindTap(els.modeBtn,toggleMode);bindTap(els.lockBtn,toggleLock);
bindTap(els.audioBtn,cycleAudioMode);
bindTap(els.serverBtn,toggleServer);bindTap(els.undoBtn,doUndo);
bindTap(els.resetOverlayBtn,doReset);

els.resetBtn.addEventListener("touchstart",e=>{e.preventDefault();els.resetBtn.classList.add("holding");resetTimer=setTimeout(doReset,800);},{passive:false});
els.resetBtn.addEventListener("touchend",()=>{clearTimeout(resetTimer);els.resetBtn.classList.remove("holding");});
els.resetBtn.addEventListener("touchcancel",()=>{clearTimeout(resetTimer);els.resetBtn.classList.remove("holding");});
els.resetBtn.addEventListener("mousedown",()=>{els.resetBtn.classList.add("holding");resetTimer=setTimeout(doReset,800);});
els.resetBtn.addEventListener("mouseup",()=>{clearTimeout(resetTimer);els.resetBtn.classList.remove("holding");});
els.resetBtn.addEventListener("mouseleave",()=>{clearTimeout(resetTimer);els.resetBtn.classList.remove("holding");});

if(window.speechSynthesis&&window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=()=>{};
render();
})();
</script>
</body>
</html>
