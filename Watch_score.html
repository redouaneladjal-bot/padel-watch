<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PadelTap Smartwatch UI</title>
  <style>
    :root {
      --watch-yellow: #ece81a;
      --deep-blue: #155f83;
      --deep-blue-border: #143847;
      --score-orange: #e6ac00;
      --lock-red: #8e2020;
      --lock-red-dark: #6f1717;
      --text-dark: #183847;
      --grid-line: rgba(24, 56, 71, 0.5);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #d7d7d7;
      font-family: Arial, sans-serif;
    }

    .watch-shell {
      width: 430px;
      height: 430px;
      border-radius: 50%;
      background: #2e2e2e;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      padding: 10px;
    }

    .watch {
      width: 100%;
      height: 100%;
      background: var(--watch-yellow);
      border: 3px solid #1d1d1d;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }

    .mode-toggle {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 74px;
      height: 30px;
      border-radius: 16px;
      background: rgba(255,255,255,0.75);
      border: 2px solid var(--deep-blue-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      cursor: pointer;
      user-select: none;
      z-index: 3;
      color: var(--text-dark);
      font-weight: bold;
      font-size: 13px;
    }

    .mode-toggle .knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 26px;
      height: 22px;
      border-radius: 12px;
      background: var(--deep-blue);
      transition: left 0.2s ease;
    }

    .mode-toggle.normal .knob {
      left: 44px;
    }

    .mode-toggle span {
      position: relative;
      z-index: 1;
    }

    .sets-board {
      position: absolute;
      left: 36px;
      top: 140px;
      width: 108px;
      color: var(--text-dark);
      font-weight: bold;
      z-index: 1;
    }

    .sets-row {
      display: grid;
      grid-template-columns: 18px repeat(3, 30px);
    }

    .sets-cell {
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      font-size: 13px;
    }

    .sets-row:not(:last-child) .sets-cell {
      border-bottom: 1px solid var(--grid-line);
    }

    .sets-row .sets-cell:not(:last-child) {
      border-right: 1px solid var(--grid-line);
    }

    .sets-head {
      font-size: 11px;
      opacity: 0.85;
    }

    .sets-team {
      font-size: 12px;
    }

    .center-stack {
      position: absolute;
      left: 56%;
      top: 54%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 2;
    }

    .score-btn {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      border: 2.5px solid var(--deep-blue-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 31px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.14);
      position: relative;
      transition: transform 0.08s ease, opacity 0.2s ease, filter 0.2s ease;
    }

    .score-btn:active {
      transform: scale(0.98);
    }

    .score-btn.disabled {
      cursor: not-allowed;
      opacity: 0.8;
      filter: grayscale(0.15);
    }

    .score-btn.disabled::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(20, 56, 71, 0.18);
    }

    .score-a {
      background: var(--deep-blue);
    }

    .score-b {
      background: var(--score-orange);
    }

    .controls {
      position: absolute;
      right: 24px;
      top: 54%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 3;
    }

    .small-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--deep-blue-border);
      background: var(--deep-blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: transform 0.08s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .small-btn:active {
      transform: scale(0.96);
    }

    .small-btn.reset-btn,
    .small-btn.lock-btn {
      left: -6px;
    }

    .small-btn.locked {
      background: var(--lock-red);
      box-shadow: 0 0 0 3px rgba(142, 32, 32, 0.18);
      border-color: var(--lock-red-dark);
    }

    .small-btn.locked::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 2px;
      background: rgba(255,255,255,0.9);
      transform: rotate(-35deg);
      border-radius: 2px;
    }

    .small-btn.holding {
      background: var(--lock-red);
    }

    .small-btn.holding::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 3px solid rgba(142, 32, 32, 0.45);
      animation: pulse 0.9s linear infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.96); opacity: 0.9; }
      100% { transform: scale(1.08); opacity: 0.15; }
    }

    .set-indicator {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: bold;
      color: var(--text-dark);
      opacity: 0.85;
      letter-spacing: 0.8px;
    }

    .lock-badge {
      position: absolute;
      top: 56px;
      right: 34px;
      font-size: 11px;
      font-weight: bold;
      color: var(--lock-red-dark);
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 3;
      letter-spacing: 0.6px;
    }

    .lock-badge.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="watch-shell">
    <div class="watch">
      <div class="mode-toggle" id="modeToggle" title="G = Golden Point / N = Normal">
        <div class="knob"></div>
        <span>G</span>
        <span>N</span>
      </div>

      <div class="lock-badge" id="lockBadge">LOCKED</div>

      <div class="sets-board">
        <div class="sets-row">
          <div class="sets-cell sets-head"></div>
          <div class="sets-cell sets-head">1</div>
          <div class="sets-cell sets-head">2</div>
          <div class="sets-cell sets-head">3</div>
        </div>
        <div class="sets-row">
          <div class="sets-cell sets-team">A</div>
          <div class="sets-cell" id="setA1">0</div>
          <div class="sets-cell" id="setA2">0</div>
          <div class="sets-cell" id="setA3">0</div>
        </div>
        <div class="sets-row">
          <div class="sets-cell sets-team">B</div>
          <div class="sets-cell" id="setB1">0</div>
          <div class="sets-cell" id="setB2">0</div>
          <div class="sets-cell" id="setB3">0</div>
        </div>
      </div>

      <div class="center-stack">
        <div class="score-btn score-a" id="scoreA">0</div>
        <div class="score-btn score-b" id="scoreB">0</div>
      </div>

      <div class="controls">
        <div class="small-btn reset-btn" id="resetBtn" title="Long press to reset">R</div>
        <div class="small-btn" id="undoBtn">U</div>
        <div class="small-btn lock-btn" id="lockBtn">L</div>
      </div>

      <div class="set-indicator" id="setIndicator">SET 1</div>
    </div>
  </div>

  <script>
    let state = {
      pointA: 0,
      pointB: 0,
      sets: [
        { a: 0, b: 0 },
        { a: 0, b: 0 },
        { a: 0, b: 0 }
      ],
      currentSet: 0,
      locked: false,
      mode: "golden"
    };

    const history = [];
    let resetPressTimer = null;
    let resetTriggered = false;

    const scoreAEl = document.getElementById("scoreA");
    const scoreBEl = document.getElementById("scoreB");
    const resetBtn = document.getElementById("resetBtn");
    const undoBtn = document.getElementById("undoBtn");
    const lockBtn = document.getElementById("lockBtn");
    const modeToggle = document.getElementById("modeToggle");
    const setIndicator = document.getElementById("setIndicator");
    const lockBadge = document.getElementById("lockBadge");

    const setEls = {
      a1: document.getElementById("setA1"),
      a2: document.getElementById("setA2"),
      a3: document.getElementById("setA3"),
      b1: document.getElementById("setB1"),
      b2: document.getElementById("setB2"),
      b3: document.getElementById("setB3")
    };

    function cloneState(s) {
      return JSON.parse(JSON.stringify(s));
    }

    function saveHistory() {
      history.push(cloneState(state));
    }

    function isDeuceState() {
      return state.pointA >= 3 && state.pointB >= 3;
    }

    function currentSetFinished(setObj) {
      const a = setObj.a;
      const b = setObj.b;
      return (a >= 6 || b >= 6) && Math.abs(a - b) >= 2;
    }

    function advanceSetIfNeeded() {
      const setObj = state.sets[state.currentSet];
      if (currentSetFinished(setObj) && state.currentSet < 2) {
        state.currentSet += 1;
      }
    }

    function winGame(team) {
      const setObj = state.sets[state.currentSet];

      if (team === "A") {
        setObj.a += 1;
      } else {
        setObj.b += 1;
      }

      state.pointA = 0;
      state.pointB = 0;

      advanceSetIfNeeded();
    }

    function incrementA() {
      if (state.locked) return;
      saveHistory();
      if (state.mode === "golden") incrementAGolden();
      else incrementANormal();
      render();
    }

    function incrementB() {
      if (state.locked) return;
      saveHistory();
      if (state.mode === "golden") incrementBGolden();
      else incrementBNormal();
      render();
    }

    function incrementAGolden() {
      if (state.pointA <= 2) {
        state.pointA += 1;
        return;
      }
      if (state.pointA === 3 && state.pointB < 3) {
        winGame("A");
        return;
      }
      if (state.pointA === 3 && state.pointB === 3) {
        winGame("A");
      }
    }

    function incrementBGolden() {
      if (state.pointB <= 2) {
        state.pointB += 1;
        return;
      }
      if (state.pointB === 3 && state.pointA < 3) {
        winGame("B");
        return;
      }
      if (state.pointA === 3 && state.pointB === 3) {
        winGame("B");
      }
    }

    function incrementANormal() {
      if (!isDeuceState()) {
        if (state.pointA <= 2) {
          state.pointA += 1;
          return;
        }
        if (state.pointA === 3 && state.pointB < 3) {
          winGame("A");
          return;
        }
        if (state.pointA === 3 && state.pointB === 3) {
          state.pointA = 4;
          return;
        }
      } else {
        if (state.pointA === state.pointB) {
          state.pointA += 1;
        } else if (state.pointA > state.pointB) {
          winGame("A");
        } else {
          state.pointA = 3;
          state.pointB = 3;
        }
      }
    }

    function incrementBNormal() {
      if (!isDeuceState()) {
        if (state.pointB <= 2) {
          state.pointB += 1;
          return;
        }
        if (state.pointB === 3 && state.pointA < 3) {
          winGame("B");
          return;
        }
        if (state.pointA === 3 && state.pointB === 3) {
          state.pointB = 4;
          return;
        }
      } else {
        if (state.pointA === state.pointB) {
          state.pointB += 1;
        } else if (state.pointB > state.pointA) {
          winGame("B");
        } else {
          state.pointA = 3;
          state.pointB = 3;
        }
      }
    }

    function getDisplayScore(team) {
      const a = state.pointA;
      const b = state.pointB;

      if (state.mode === "golden") {
        const labels = ["0", "15", "30", "40"];
        return team === "A" ? labels[Math.min(a, 3)] : labels[Math.min(b, 3)];
      }

      if (a >= 3 && b >= 3) {
        if (a === b) return "D";
        if (team === "A") return a > b ? "A" : "40";
        return b > a ? "A" : "40";
      }

      const labels = ["0", "15", "30", "40", "A"];
      return team === "A" ? labels[a] : labels[b];
    }

    function resetAll() {
      saveHistory();
      state = {
        pointA: 0,
        pointB: 0,
        sets: [
          { a: 0, b: 0 },
          { a: 0, b: 0 },
          { a: 0, b: 0 }
        ],
        currentSet: 0,
        locked: false,
        mode: state.mode
      };
      render();
    }

    function undo() {
      if (history.length === 0) return;
      state = history.pop();
      render();
    }

    function toggleLock() {
      state.locked = !state.locked;
      render();
    }

    function toggleMode() {
      saveHistory();
      state.mode = state.mode === "golden" ? "normal" : "golden";
      state.pointA = 0;
      state.pointB = 0;
      render();
    }

    function startResetHold() {
      resetTriggered = false;
      resetBtn.classList.add("holding");
      resetPressTimer = setTimeout(() => {
        resetTriggered = true;
        resetBtn.classList.remove("holding");
        resetAll();
      }, 900);
    }

    function cancelResetHold() {
      clearTimeout(resetPressTimer);
      resetBtn.classList.remove("holding");
    }

    function render() {
      scoreAEl.textContent = getDisplayScore("A");
      scoreBEl.textContent = getDisplayScore("B");

      setEls.a1.textContent = state.sets[0].a;
      setEls.a2.textContent = state.sets[1].a;
      setEls.a3.textContent = state.sets[2].a;
      setEls.b1.textContent = state.sets[0].b;
      setEls.b2.textContent = state.sets[1].b;
      setEls.b3.textContent = state.sets[2].b;

      setIndicator.textContent = `SET ${Math.min(state.currentSet + 1, 3)}`;

      if (state.locked) {
        lockBtn.classList.add("locked");
        lockBtn.textContent = "L";
        lockBadge.classList.add("visible");
        scoreAEl.classList.add("disabled");
        scoreBEl.classList.add("disabled");
      } else {
        lockBtn.classList.remove("locked");
        lockBtn.textContent = "L";
        lockBadge.classList.remove("visible");
        scoreAEl.classList.remove("disabled");
        scoreBEl.classList.remove("disabled");
      }

      if (state.mode === "normal") {
        modeToggle.classList.add("normal");
      } else {
        modeToggle.classList.remove("normal");
      }
    }

    scoreAEl.addEventListener("click", incrementA);
    scoreBEl.addEventListener("click", incrementB);
    undoBtn.addEventListener("click", undo);
    lockBtn.addEventListener("click", toggleLock);
    modeToggle.addEventListener("click", toggleMode);

    resetBtn.addEventListener("mousedown", startResetHold);
    resetBtn.addEventListener("mouseup", cancelResetHold);
    resetBtn.addEventListener("mouseleave", cancelResetHold);

    resetBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      startResetHold();
    }, { passive: false });

    resetBtn.addEventListener("touchend", (e) => {
      e.preventDefault();
      cancelResetHold();
    }, { passive: false });

    resetBtn.addEventListener("touchcancel", cancelResetHold);

    render();
  </script>
</body>
</html>
